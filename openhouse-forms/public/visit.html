<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"><title>Openhouse — Visit Form</title><link rel="stylesheet" href="/css/styles.css"></head>
<body>
<header class="hdr">
  <div class="hdr-logo"><img src="/images/logo_2.png" alt="Openhouse" style="height:32px"></div>
  <div class="hdr-center"><div class="form-name">Visit Form — Audit</div></div>
</header>
<div class="ctn">
  <div class="card"><div class="card-t">Load Scheduled Visit</div>
    <div class="load-row"><div class="fg"><label>UID</label><select id="selUid" style="font-family:var(--mono)"></select></div>
      <button type="button" class="btn btn-dark btn-sm" id="loadBtn">Load</button></div>
    <div class="pf-st" id="pfSt"></div></div>
  <form id="form" style="display:none"><input type="hidden" name="uid" id="fUid">
    <div class="card" id="prevCard">
      <div class="card-t">Property Summary</div>
      <div class="r2"><div class="fg"><label>UID</label><input type="text" id="v_uid" class="pre" readonly></div>
        <div class="fg"><label>Source</label><input type="text" id="v_src" class="pre" readonly></div></div>
      <div class="r2"><div class="fg"><label>Society</label><input type="text" id="v_soc" class="pre" readonly></div>
        <div class="fg"><label>Locality</label><input type="text" id="v_loc" class="pre" readonly></div></div>
      <div class="r2"><div class="fg"><label>Owner/Broker</label><input type="text" id="v_owner" class="pre" readonly></div>
        <div class="fg"><label>Phone</label><input type="text" id="v_phone" class="pre" readonly></div></div>
      <div class="r3">
        <div class="fg">
          <label>Unit No</label>
          <input type="text" name="v_unit" id="v_unit">
        </div>
        <div class="fg">
          <label>Tower No</label>
          <input type="text" name="v_tower" id="v_tower">
        </div>
        <div class="fg">
            <label>Floor</label>
            <select name="v_floor" id="selFloor"></select>
        </div>
      </div>  
      <div class="r3"><div class="fg"><label>Area (in sqft)</label><input type="number" name="area_sqft_edit" id="v_area" step="0.01"></div>
        <div class="fg"><label>Config</label><input type="text" id="v_cfg" class="pre" readonly></div>
        <div class="fg"><label>Ask (In Lakhs)</label><input type="number" name="demand_price" id="v_ask" step="0.01"></div></div>
      <div class="r2"><div class="fg"><label>Assigned By</label><input type="text" id="v_ab" class="pre" readonly></div>
        <div class="fg"><label>Assigned To</label><input type="text" id="v_at" class="pre" readonly></div></div>
    </div>
    <div id="startWrap"><button type="button" class="btn btn-dark" id="startBtn" style="width:100%">Start Audit Form</button></div>
    <div id="stepperWrap" style="display:none">
      <div class="stepper">
        <div class="step active" onclick="goStep(1)"><div class="step-num">1</div><span class="step-text">Rooms</span></div><div class="step-line"></div>
        <div class="step" onclick="goStep(2)"><div class="step-num">2</div><span class="step-text">Amenities</span></div><div class="step-line"></div>
        <div class="step" onclick="goStep(3)"><div class="step-num">3</div><span class="step-text">Structure</span></div><div class="step-line"></div>
        <div class="step" onclick="goStep(4)"><div class="step-num">4</div><span class="step-text">Balconies</span></div>
      </div>
      <div class="prog-wrap" id="prog"><div class="prog-bar"><div class="prog-fill" style="width:0%"></div></div><div class="prog-lbl">0%</div></div>

      <!-- P1: Rooms -->
      <div class="page active" id="p1"><div class="card"><div class="card-t">Rooms & Extra Area</div>
        <div class="fg"><label>Extra Area</label><div class="pills" id="extraP"></div></div>
        <div class="r2">
          <div class="fg"><label>Total Bathrooms <span class="req">*</span></label><select name="bathrooms" id="selBath" required></select><div class="err-msg">Required</div></div>
          <div class="fg"><label>Total Balconies <span class="req">*</span></label><select name="balconies" id="selBal" required></select><div class="err-msg">Required</div></div>
        </div></div>
      <div class="btn-row"><div></div><button type="button" class="btn btn-dark" onclick="nextStep()">Next →</button></div></div>

      <!-- P2: Amenities -->
      <div class="page" id="p2"><div class="card"><div class="card-t">Amenities</div>
        <div class="r2">
          <div class="fg"><label>Gas Pipeline</label><div class="radios" id="gasGrp"></div></div>
          <div class="fg"><label>Parking <span class="req">*</span></label><select name="parking" id="selPark" required></select><div class="err-msg">Required</div></div>
        </div><hr class="div">
        <div class="fg"><label>Furnishing <span class="req">*</span></label><select name="furnishing" id="selFurn" required></select><div class="err-msg">Required</div></div>
        <div class="fg" id="furnWrap"><label>Furnishing Details</label><div class="pills" id="furnP"></div></div>
      </div>
      <div class="btn-row"><button type="button" class="btn btn-out" onclick="S.prev()">← Back</button><button type="button" class="btn btn-dark" onclick="nextStep()">Next →</button></div></div>

      <!-- P3: Structure -->
      <div class="page" id="p3"><div class="card"><div class="card-t">Structure & Facing</div>
        <div class="r3">
          <div class="fg"><label>Total No. of Lifts <span class="req">*</span></label><select name="total_lifts" id="selLift" required></select><div class="err-msg">Required</div></div>
          <div class="fg"><label>Total No. of Floors <span class="req">*</span></label><select name="total_floors_tower" id="selTFloor" required></select><div class="err-msg">Required</div></div>
          <div class="fg"><label>Total Flats per Floor <span class="req">*</span></label><select name="total_flats_floor" id="selFlat" required></select><div class="err-msg">Required</div></div>
        </div><hr class="div">
        <div class="r2">
          <div class="fg"><label>Exit Facing <span class="req">*</span></label><select name="exit_facing" id="selExit" required></select><div class="err-msg">Required</div></div>
          <div class="fg"><label>Compass Photo</label><div class="img-single"><button type="button" class="img-single-btn" id="exitCBtn">Upload</button><div class="img-single-preview" id="exitCPrev"><img></div><input type="hidden" name="exit_compass_image" id="exitCUrl"></div></div>
        </div><hr class="div">
        <div class="fg"><label>Video Link</label><input type="url" name="video_link" pattern="https?://.+"></div>
      </div>
      <div class="btn-row"><button type="button" class="btn btn-out" onclick="S.prev()">← Back</button><button type="button" class="btn btn-dark" onclick="nextStep()">Next →</button></div></div>

      <!-- P4: Balconies -->
      <div class="page" id="p4"><div class="card"><div class="card-t">Balcony Details</div>
        <div id="balCards"></div></div>
      <div class="btn-row"><button type="button" class="btn btn-out" onclick="S.prev()">← Back</button><button type="button" class="btn btn-dark" id="submitBtn">Submit Visit</button></div></div>
    </div>
  </form>
</div>
<script src="/js/shared.js"></script>
<script>
let S,opts,exitC;const pages=['p1','p2','p3','p4'];
function goStep(n){if(n<S.current){S.show(n);return}for(let i=S.current;i<n;i++)if(!validatePage(pages[i-1]))return;S.show(n)}
function nextStep(){if(validatePage(pages[S.current-1]))S.next()}
document.addEventListener('DOMContentLoaded',async()=>{
  S=makeStepper(4,document.getElementById('prog'));
  try{
    const r=await fetch(`${API}/api/config`);opts=(await r.json()).options;
    fillPills(document.getElementById('extraP'),'extra_area',opts.extraAreas,'No Extra Room');
    fillNumSelect(document.getElementById('selBath'),1,10,'Select');fillNumSelect(document.getElementById('selBal'),1,10,'Select');
    fillRadios(document.getElementById('gasGrp'),'gas_pipeline',opts.yesNo);
    fillSelect(document.getElementById('selPark'),opts.parkingOptions,'Select');
    fillSelect(document.getElementById('selFurn'),opts.furnishingLevels,'Select');
    fillPills(document.getElementById('furnP'),'furnishing_details',opts.furnishingDetails,'No Items');
    fillNumSelect(document.getElementById('selLift'),1,10,'Select');fillNumSelect(document.getElementById('selTFloor'),1,50,'Select');fillNumSelect(document.getElementById('selFlat'),1,10,'Select');
    fillNumSelect(document.getElementById('selFloor'),1,50,'Select');
    fillSelect(document.getElementById('selExit'),opts.directions,'Select');
    exitC=initSingleUpload('exitCBtn','exitCPrev','exitCUrl');
    document.getElementById('selFurn').addEventListener('change',e=>{document.getElementById('furnWrap').style.display=e.target.value==='Unfurnished'?'none':'block'});
    const ur=await fetch(`${API}/api/visit/uids`);const uids=await ur.json();
    fillUidSelect(document.getElementById('selUid'),uids);makeSearchable(document.getElementById('selUid'));
    const p=new URLSearchParams(location.search);if(p.get('uid')){document.getElementById('selUid').value=p.get('uid');loadData()}
    document.getElementById('selBal').addEventListener('change',buildBalconyCards);
    document.getElementById('startBtn').addEventListener('click',()=>{document.getElementById('startWrap').style.display='none';document.getElementById('prevCard').style.display='none';document.getElementById('stepperWrap').style.display='block'});
  }catch(e){toast('Config failed','err')}
});
document.getElementById('loadBtn').addEventListener('click',loadData);
async function loadData(){const uid=document.getElementById('selUid').value;if(!uid){toast('Select UID','warn');return}
  const st=document.getElementById('pfSt');st.className='pf-st show';st.textContent='Loading...';
  try{const r=await fetch(`${API}/api/visit/prefill/${uid}`);if(!r.ok)throw new Error((await r.json()).error);const d=await r.json();
    document.getElementById('fUid').value=d.uid;
    document.getElementById('v_uid').value=d.uid;document.getElementById('v_src').value=d.source||'';
    document.getElementById('v_soc').value=d.society_name||'';document.getElementById('v_loc').value=d.locality||'';
    document.getElementById('v_owner').value=d.owner_broker_name||'';document.getElementById('v_phone').value=d.contact_no||'';
    document.getElementById('v_unit').value=d.unit_no||'';document.getElementById('v_tower').value=d.tower_no||'';
    document.getElementById('selFloor').value=d.floor??'';document.getElementById('v_area').value=d.area_sqft??'';
    document.getElementById('v_cfg').value=d.configuration||'';document.getElementById('v_ask').value=d.demand_price||'';
    document.getElementById('v_ab').value=d.assigned_by||'';document.getElementById('v_at').value=d.field_exec||'';
    const sv=(n,v)=>{const el=document.querySelector(`[name="${n}"]`);if(el&&v!=null)el.value=v};
    const sr=(n,v)=>{if(!v)return;const rb=document.querySelector(`input[name="${n}"][value="${v}"]`);if(rb)rb.checked=true};
    sv('bathrooms',d.bathrooms);sv('balconies',d.balconies);
    if(d.extra_area){try{JSON.parse(d.extra_area).forEach(v=>{const cb=document.querySelector(`input[name="extra_area"][value="${v}"]`);if(cb)cb.checked=true})}catch(e){}}
    sr('gas_pipeline',d.gas_pipeline);sv('parking',d.parking);sv('furnishing',d.furnishing);
    if(d.furnishing==='Unfurnished')document.getElementById('furnWrap').style.display='none';
    if(d.furnishing_details){try{JSON.parse(d.furnishing_details).forEach(v=>{const cb=document.querySelector(`input[name="furnishing_details"][value="${v}"]`);if(cb)cb.checked=true})}catch(e){}}
    sv('total_lifts',d.total_lifts);sv('total_floors_tower',d.total_floors_tower);sv('total_flats_floor',d.total_flats_floor);
    sv('exit_facing',d.exit_facing);if(d.exit_compass_image)exitC.setUrl(d.exit_compass_image);sv('video_link',d.video_link);
    if(d.balconies){document.getElementById('selBal').value=d.balconies;buildBalconyCards()}
    if(d.balcony_details){try{const bd=typeof d.balcony_details==='string'?JSON.parse(d.balcony_details):d.balcony_details;
      setTimeout(()=>bd.forEach(b=>{const i=b.index;const at=document.querySelector(`.ba[data-i="${i}"]`);if(at)at.value=b.attached_to||'';
        const bf=document.querySelector(`.bf[data-i="${i}"]`);if(bf)bf.value=b.facing||'';
        const bv=document.querySelector(`.bv[data-i="${i}"]`);if(bv)bv.value=b.view||''}),100)}catch(e){}}
    document.getElementById('form').style.display='block';
    st.className='pf-st show ok';st.textContent=`Loaded: ${uid}`;
  }catch(e){st.className='pf-st show err';st.textContent=e.message}}
function buildBalconyCards(){const n=parseInt(document.getElementById('selBal').value)||0;const c=document.getElementById('balCards');c.innerHTML='';
  const isGurgaon=(document.getElementById('v_uid').value||'').startsWith('OHG');
  const views=isGurgaon?[...opts.balconyViews,'Aravalli'].sort():opts.balconyViews;
  for(let i=1;i<=n;i++){c.innerHTML+=`<div class="card" style="margin-top:8px;padding:10px"><div class="sub-h">Balcony ${i}</div>
    <div class="fg"><label>Attached To <span class="req">*</span></label><select class="ba" data-i="${i}" required><option value="">Select...</option>${opts.balconyAttach.map(a=>`<option>${a}</option>`).join('')}</select><div class="err-msg">Required</div></div>
    <div class="r2"><div class="fg"><label>Facing</label><select class="bf" data-i="${i}">${['<option value="">—</option>',...opts.directions.map(d=>`<option>${d}</option>`)].join('')}</select></div>
      <div class="fg"><label>Compass Photo</label><div class="img-single"><button type="button" class="img-single-btn" id="bc${i}Btn">Upload</button><div class="img-single-preview" id="bc${i}Prev"><img></div><input type="hidden" id="bc${i}Url"></div></div></div>
    <div class="r2"><div class="fg"><label>View</label><select class="bv" data-i="${i}">${['<option value="">—</option>',...views.map(v=>`<option>${v}</option>`)].join('')}</select></div>
      <div class="fg"><label>View Photo</label><div class="img-single"><button type="button" class="img-single-btn" id="bv${i}Btn">Upload</button><div class="img-single-preview" id="bv${i}Prev"><img></div><input type="hidden" id="bv${i}Url"></div></div></div></div>`}
  for(let i=1;i<=n;i++){initSingleUpload(`bc${i}Btn`,`bc${i}Prev`,`bc${i}Url`);initSingleUpload(`bv${i}Btn`,`bv${i}Prev`,`bv${i}Url`)}}
function getBalconyDetails(){const items=[];document.querySelectorAll('.ba').forEach(el=>{const i=el.dataset.i;
  items.push({index:parseInt(i),attached_to:el.value,facing:document.querySelector(`.bf[data-i="${i}"]`)?.value||'',
    compass_image:document.getElementById(`bc${i}Url`)?.value||'',view:document.querySelector(`.bv[data-i="${i}"]`)?.value||'',
    view_image:document.getElementById(`bv${i}Url`)?.value||''})});return JSON.stringify(items)}
document.getElementById('submitBtn').addEventListener('click',()=>{if(!validatePage('p4'))return;
  const fd=new FormData(document.getElementById('form'));const body=Object.fromEntries(fd.entries());
  // Video link validation
  if(body.video_link&&!body.video_link.match(/^https?:\/\/.+/)){toast('Video link must be a valid URL starting with http','err');return}
  body.gas_pipeline=getRadio('gas_pipeline');body.extra_area=getCheckedJSON('extra_area');body.furnishing_details=getCheckedJSON('furnishing_details');
  body.balcony_details=getBalconyDetails();body.additional_images='[]';
  body.source=document.getElementById('v_src').value;body.owner_broker_name=document.getElementById('v_owner').value;
  body.first_name=(document.getElementById('v_owner').value||'').split(' ')[0];
  body.contact_no=document.getElementById('v_phone').value;
  const uidVal=document.getElementById('v_uid').value;
  body.city=uidVal.substring(2,4)==='GH'?'Ghaziabad':uidVal.substring(2,3)==='G'?'Gurgaon':'Noida';
  body.society_name=document.getElementById('v_soc').value;body.locality=document.getElementById('v_loc').value;
  body.unit_no=document.getElementById('v_unit').value;body.tower_no=document.getElementById('v_tower').value;
  body.floor=document.getElementById('selFloor').value;body.configuration=document.getElementById('v_cfg').value;
  body.area_sqft=document.getElementById('v_area').value;
  submitBtn(document.getElementById('submitBtn'),async()=>{const r=await fetch(`${API}/api/visit/submit`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    const res=await r.json();if(!r.ok)throw new Error(res.error);showThankYou(body.uid)})});
</script>
</body></html>
