<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"><title>Openhouse — Token Request</title><link rel="stylesheet" href="/css/styles.css"></head>
<body>
<header class="hdr centered"><div class="logo">OPENHOUSE</div><div class="logo-sub">Token Request Form</div></header>
<div class="ctn">
  <div class="card"><div class="card-t">Load Property</div>
    <div class="load-row"><div class="fg"><label>UID</label><select id="selUid" style="font-family:var(--mono)"></select></div>
      <button type="button" class="btn btn-dark btn-sm" id="loadBtn">Load</button></div>
    <div class="pf-st" id="pfSt"></div></div>
  <form id="tokenForm" style="display:none"><input type="hidden" name="uid" id="fUid">
    <!-- Property Details with tower + config display -->
    <div class="card" id="prevCard"><div class="card-t">Property Details</div><div class="card-d">From visit. Double-tap to edit.</div>
      <div class="r2"><div class="fg"><label>UID</label><input type="text" id="d_uid" class="pre" readonly></div>
        <div class="fg"><label>Source</label><input type="text" id="d_src" class="pre" readonly></div></div>
      <div class="r2"><div class="fg"><label>Society</label><input type="text" id="d_soc" class="pre" readonly></div>
        <div class="fg"><label>Locality</label><input type="text" id="d_loc" class="pre" readonly></div></div>
      <div class="r2"><div class="fg"><label>Owner/Broker</label><input type="text" id="d_owner" class="pre" readonly></div>
        <div class="fg"><label>Phone</label><input type="text" id="d_phone" class="pre" readonly></div></div>
      <div class="r3"><div class="fg"><label>Unit</label><input type="text" id="d_unit" class="pre" readonly></div>
        <div class="fg"><label>Tower</label><input type="text" id="d_tower" class="pre" readonly></div>
        <div class="fg"><label>Floor</label><input type="text" id="d_floor" class="pre" readonly></div></div>
      <div class="r2"><div class="fg"><label>Area</label><input type="text" id="d_area" class="pre" readonly></div>
        <div class="fg"><label>Config</label><input type="text" id="d_cfg" class="pre" readonly></div></div>
      <div class="fg"><label>Assigned By</label><input type="text" id="d_ab" class="pre" readonly></div>
    </div>

    <!-- Token -->
    <div class="card"><div class="card-t">Token Request</div>
      <div class="fg"><label>Requested By</label><input type="text" name="token_requested_by"></div>
      <div class="fg"><label>Token Amount (₹) <span class="req">*</span></label><input type="number" name="token_amount_requested" required><div class="err-msg">Required</div></div></div>

    <!-- Cheque OCR -->
    <div class="card" style="border-left:3px solid var(--ac2)"><div class="card-t">Cheque Details</div><div class="card-d">Upload cancelled cheque to auto-extract, or enter manually.</div>
      <div class="fg"><label>Cancelled Cheque</label>
        <div class="img-single"><button type="button" class="img-single-btn" id="chequeBtn">📷 Upload Cheque</button>
          <div class="img-single-preview" id="chequePrev"><img></div><input type="hidden" name="cheque_image_url" id="chequeUrl">
          <button type="button" class="btn btn-sm btn-out" id="ocrBtn" style="display:none;margin-left:4px">Extract</button>
        </div><div id="ocrStatus" style="font-size:10px;color:var(--tx3);margin-top:3px"></div></div>
      <div class="r2"><div class="fg"><label>Bank A/C No.</label><input type="text" name="cheque_account_number" id="ocrAc" inputmode="numeric" pattern="[0-9]*" oninput="this.value=this.value.replace(/\D/g,'')"></div>
        <div class="fg"><label>Bank Name</label><select name="cheque_bank_name" id="ocrBank"><option value="">Select bank...</option></select></div></div>
      <div class="fg"><label>IFSC Code</label><input type="text" name="cheque_ifsc" id="ocrIfsc" class="input-md"></div></div>

    <!-- Deal Terms -->
    <div class="card"><div class="card-t">Deal Terms</div>
      <div class="r2">
        <div class="fg"><label>Registry Status <span class="req">*</span></label><select name="registry_status" required><option value="">Select...</option><option>Registered</option><option>Unregistered</option><option>Under Process</option></select><div class="err-msg">Required</div></div>
        <div class="fg"><label>Occupancy <span class="req">*</span></label><select name="occupancy_status" id="selOcc" required><option value="">Select...</option><option>Vacant</option><option>Tenant</option><option>Owner Staying</option></select><div class="err-msg">Required</div></div>
      </div>
      <div class="fg" id="hdWrap" style="display:none"><label>Key Handover Date <span class="req">*</span></label><input type="date" name="key_handover_date" id="hdDate"><div class="err-msg">Required</div></div>
      <div class="r2">
        <div class="fg"><label>Guaranteed Sale Price (₹ L)</label><input type="number" name="guaranteed_sale_price" step="0.01"></div>
        <div class="fg"><label>Performance Guarantee (₹)</label><input type="number" name="performance_guarantee"></div>
      </div><hr class="div">
      <div class="arrow-row"><div class="fg"><label>Initial Period (Days) <span class="req">*</span></label><input type="number" name="initial_period" required><div class="err-msg">Required</div></div>
        <div class="arrow-sym">→</div>
        <div class="fg"><label>Rent Payable (₹)</label><input type="number" name="rent_payable_initial_period" id="rip"></div></div>
      <label class="na-toggle" style="margin-bottom:8px"><input type="checkbox" id="rip_na" onchange="toggleNA('rip','No rent')"><span>No rent payable during initial period</span></label>
      <div class="arrow-row"><div class="fg"><label>Grace Period (Days) <span class="req">*</span></label><input type="number" name="grace_period" required><div class="err-msg">Required</div></div>
        <div class="arrow-sym">→</div>
        <div class="fg"><label>Rent Payable (₹)</label><input type="number" name="rent_payable_grace_period" id="rgp"></div></div>
      <label class="na-toggle"><input type="checkbox" id="rgp_na" onchange="toggleNA('rgp','No rent')"><span>No rent payable during grace period</span></label></div>

    <!-- Loan -->
    <div class="card"><div class="card-t">Loan Details</div>
      <div class="fg"><label>Bank Name</label><select name="bank_name_loan" id="selBankLoan"><option value="">Select bank...</option></select>
        <input type="text" name="bank_name_loan_other" id="bankOther" style="display:none;margin-top:4px"></div>
      <div class="r2"><div class="fg"><label>Outstanding Loan (₹)</label><input type="number" name="outstanding_loan"></div>
        <div class="fg"><label>Loan A/C Number</label><input type="text" name="loan_account_number" inputmode="numeric" pattern="[0-9]*" oninput="this.value=this.value.replace(/\D/g,'')"></div></div>
      <div class="fg"><label>Willing to pay loan?</label>
        <div class="radios"><label><input type="radio" name="loan_pay_willingness" value="Yes"><span>Yes</span></label><label><input type="radio" name="loan_pay_willingness" value="No"><span>No</span></label></div></div></div>

    <!-- Documents -->
    <div class="card"><div class="card-t">Documents Available</div>
      <div class="fg"><div id="docsSelect"></div></div>
      <div class="fg"><label>Remarks (if any)</label><textarea name="token_remarks" rows="2"></textarea></div></div>

    <div class="btn-row">
      <button type="button" class="btn btn-amb" id="draftBtn">Save Draft</button>
      <button type="button" class="btn btn-dark" id="submitBtn">Submit</button></div>
  </form>
</div>
<script src="/js/shared.js"></script>
<script>
let docsMsel,currentUid,chequeUploader;
document.addEventListener('DOMContentLoaded',async()=>{
  try{
    const r=await fetch(`${API}/api/config`);const opts=(await r.json()).options;
    docsMsel=makeMultiSelect(document.getElementById('docsSelect'),'documents_available',opts.documentsAvailable);
    chequeUploader=initSingleUpload('chequeBtn','chequePrev','chequeUrl');
    const bankSel=document.getElementById('selBankLoan');const ocrBankSel=document.getElementById('ocrBank');
    opts.banks.forEach(b=>{bankSel.innerHTML+=`<option value="${b}">${b}</option>`;ocrBankSel.innerHTML+=`<option value="${b}">${b}</option>`});
    bankSel.addEventListener('change',()=>{document.getElementById('bankOther').style.display=bankSel.value==='Others'?'block':'none'});
    document.getElementById('selOcc').addEventListener('change',e=>{const w=document.getElementById('hdWrap'),d=document.getElementById('hdDate');
      if(e.target.value==='Tenant'){w.style.display='block';d.required=true}else{w.style.display='none';d.required=false;d.value=''}});
    const ur=await fetch(`${API}/api/token-request/uids`);const uids=await ur.json();
    fillUidSelect(document.getElementById('selUid'),uids);makeSearchable(document.getElementById('selUid'));
    const p=new URLSearchParams(location.search);if(p.get('uid')){document.getElementById('selUid').value=p.get('uid');loadData()}
    setInterval(()=>{document.getElementById('ocrBtn').style.display=document.getElementById('chequeUrl').value?'inline-flex':'none'},500);
    document.getElementById('ocrBtn').addEventListener('click',async()=>{const url=document.getElementById('chequeUrl').value;if(!url)return;
      document.getElementById('ocrStatus').textContent='Extracting...';const d=await ocrCheque(url);
      if(d.extracted){if(d.account_number)document.getElementById('ocrAc').value=d.account_number.replace(/\D/g,'');
        if(d.bank_name){const bs=document.getElementById('ocrBank');const bn=d.bank_name.toLowerCase();let matched=false;
          for(const o of bs.options){if(o.value&&bn.includes(o.value.toLowerCase().split(' ')[0].toLowerCase())){bs.value=o.value;matched=true;break}}if(!matched)bs.value='Others'}
        if(d.ifsc_code)document.getElementById('ocrIfsc').value=d.ifsc_code;document.getElementById('ocrStatus').innerHTML='<span style="color:var(--grn)">Extracted! Verify below.</span>'}
      else{document.getElementById('ocrStatus').innerHTML='<span style="color:var(--red)">Could not extract. Enter manually.</span>'}});
  }catch(e){toast('Failed','err')}
});
document.getElementById('loadBtn').addEventListener('click',loadData);
async function loadData(){const uid=document.getElementById('selUid').value;if(!uid){toast('Select UID','warn');return}
  const st=document.getElementById('pfSt');st.className='pf-st show';st.textContent='Loading...';
  try{const r=await fetch(`${API}/api/token-request/prefill/${uid}`);if(!r.ok)throw new Error((await r.json()).error);const d=await r.json();
    document.getElementById('fUid').value=d.uid;currentUid=uid;
    document.getElementById('d_uid').value=d.uid;document.getElementById('d_src').value=d.source||'';
    document.getElementById('d_soc').value=d.society_name||'';document.getElementById('d_loc').value=d.locality||'';
    document.getElementById('d_owner').value=d.owner_broker_name||'';document.getElementById('d_phone').value=d.contact_no||'';
    document.getElementById('d_unit').value=d.unit_no||'';document.getElementById('d_tower').value=d.tower_no||'';
    document.getElementById('d_floor').value=d.floor??'';document.getElementById('d_area').value=d.area_sqft??'';
    document.getElementById('d_cfg').value=configDisplay(d.configuration,d.extra_area);
    document.getElementById('d_ab').value=d.assigned_by||'';
    const sv=(n,v)=>{const el=document.querySelector(`[name="${n}"]`);if(el&&v!=null)el.value=v};
    const sr=(n,v)=>{if(!v)return;const rb=document.querySelector(`input[name="${n}"][value="${v}"]`);if(rb)rb.checked=true};
    sv('token_amount_requested',d.token_amount_requested);sv('token_requested_by',d.token_requested_by);
    sv('cheque_account_number',d.cheque_account_number);sv('cheque_bank_name',d.cheque_bank_name);sv('cheque_ifsc',d.cheque_ifsc);
    if(d.cheque_image_url)chequeUploader.setUrl(d.cheque_image_url);
    sv('registry_status',d.registry_status);sv('occupancy_status',d.occupancy_status);
    if(d.occupancy_status==='Tenant'){document.getElementById('hdWrap').style.display='block';document.getElementById('hdDate').required=true;if(d.key_handover_date)sv('key_handover_date',d.key_handover_date.split('T')[0])}
    sv('guaranteed_sale_price',d.guaranteed_sale_price);sv('performance_guarantee',d.performance_guarantee);
    sv('initial_period',d.initial_period);sv('grace_period',d.grace_period);
    if(d.rent_payable_initial_period&&String(d.rent_payable_initial_period).toUpperCase()==='N/A'){document.getElementById('rip_na').checked=true;toggleNA('rip','No rent')}else sv('rent_payable_initial_period',d.rent_payable_initial_period);
    if(d.rent_payable_grace_period&&String(d.rent_payable_grace_period).toUpperCase()==='N/A'){document.getElementById('rgp_na').checked=true;toggleNA('rgp','No rent')}else sv('rent_payable_grace_period',d.rent_payable_grace_period);
    if(d.bank_name_loan){const bs=document.getElementById('selBankLoan');bs.value=d.bank_name_loan;if(d.bank_name_loan==='Others')document.getElementById('bankOther').style.display='block'}
    sv('outstanding_loan',d.outstanding_loan);sv('loan_account_number',d.loan_account_number);sr('loan_pay_willingness',d.loan_pay_willingness);
    sv('token_remarks',d.token_remarks);
    if(d.documents_available){try{docsMsel.setSelected(typeof d.documents_available==='string'?JSON.parse(d.documents_available):d.documents_available)}catch(e){}}
    document.getElementById('tokenForm').style.display='block';enableDoubleTapEdit(document.getElementById('prevCard'));
    st.className='pf-st show ok';st.textContent=`Loaded: ${uid}${d.token_is_draft?' (Draft)':''}`;
  }catch(e){st.className='pf-st show err';st.textContent=e.message;document.getElementById('tokenForm').style.display='none'}}
function collectBody(){const fd=new FormData(document.getElementById('tokenForm'));const body=Object.fromEntries(fd.entries());
  body.loan_pay_willingness=getRadio('loan_pay_willingness');body.documents_available=docsMsel.getSelected();
  if(body.bank_name_loan==='Others')body.bank_name_loan=document.getElementById('bankOther').value||'Others';
  if(document.getElementById('rip').dataset.na==='1')body.rent_payable_initial_period='N/A';
  if(document.getElementById('rgp').dataset.na==='1')body.rent_payable_grace_period='N/A';return body}
document.getElementById('draftBtn').addEventListener('click',()=>{const body=collectBody();body.is_draft=true;
  submitBtn(document.getElementById('draftBtn'),async()=>{const r=await fetch(`${API}/api/token-request/submit`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    const res=await r.json();if(!r.ok)throw new Error(res.error);toast('Draft saved!','ok')})});
document.getElementById('submitBtn').addEventListener('click',()=>{
  const{valid,missing}=validateForm('tokenForm');if(!valid){toast(`Missing: ${missing.slice(0,3).join(', ')}`,'err');return}
  const body=collectBody();body.is_draft=false;
  submitBtn(document.getElementById('submitBtn'),async()=>{const r=await fetch(`${API}/api/token-request/submit`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    const res=await r.json();if(!r.ok)throw new Error(res.error);showThankYou(currentUid)})});
</script>
</body></html>
