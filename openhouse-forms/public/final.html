<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"><title>Openhouse — Key Handover Acknowledgement (For Owner)</title><link rel="stylesheet" href="/css/styles.css">
<style>
.email-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:999;display:none;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto}
.email-overlay.open{display:flex}
.email-box{background:var(--sf);border-radius:12px;width:100%;max-width:640px;margin:40px auto;box-shadow:0 12px 40px rgba(0,0,0,.25);overflow:hidden}
.email-hdr{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid var(--bd);background:var(--bg)}
.email-body{padding:16px;max-height:60vh;overflow-y:auto}
.email-ftr{padding:12px 16px;border-top:1px solid var(--bd);display:flex;gap:8px;justify-content:flex-end}
</style></head>
<body>
<header class="hdr">
  <a href="/" class="hdr-logo"><img src="/images/logo_2.png" alt="Openhouse" style="height:32px"></a>
  <div class="hdr-center"><div class="form-name">Key Handover Acknowledgement (For Owner)</div></div>
  <div class="hdr-right"></div>
</header>
<div class="ctn">
  <div class="card"><div class="card-t">Load Property</div>
    <div class="load-row"><div class="fg"><label>UID</label><select id="selUid" style="font-family:var(--mono)"></select></div>
      <button type="button" class="btn btn-dark btn-sm" id="loadBtn">Load</button></div>
    <div class="pf-st" id="pfSt"></div></div>

  <form id="finalForm" style="display:none"><input type="hidden" name="uid" id="fUid">
    <div class="card"><div class="card-t">Amount Summary</div>
      <div class="r3">
        <div class="fg"><label>Total Deposit</label><input type="text" id="pgAmt" class="pre" readonly></div>
        <div class="fg"><label>Token Paid</label><input type="text" id="tkAmt" class="pre" readonly></div>
        <div class="fg"><label>Remaining Amount</label><input type="text" id="remAmt" class="pre" readonly style="font-weight:700;color:var(--ac)"></div>
      </div>
      <input type="hidden" name="remaining_amount" id="remHidden">
    </div>

    <div class="card"><div class="fg"><label>Key Handover Date <span class="req">*</span></label><input type="date" name="key_handover_date" id="hdDate" required><div class="err-msg">Required</div></div></div>

    <div class="card" id="ownerEmailsCard" style="display:none"><div class="card-t">Owner Email(s)</div>
      <div id="ownerEmailsList" style="font-size:13px;line-height:1.8"></div>
    </div>

    <div class="btn-row">
      <button type="button" class="btn btn-dark" id="submitBtn">Submit</button>
      <button type="button" class="btn btn-grn" id="pdfBtn" disabled>Payment Receipt</button>
    </div>
    <button type="button" class="btn btn-out" id="emailBtn" disabled style="width:100%;margin-top:8px;color:var(--ac2);border-color:var(--ac2)">📧 Preview Mail</button>
  </form>
</div>

<div class="email-overlay" id="emailModal">
  <div class="email-box">
    <div class="email-hdr"><h3 style="font-size:14px;margin:0">Email Preview</h3><button class="btn btn-out btn-sm" onclick="closeEmailModal()">✕</button></div>
    <div class="email-body" id="emailPreviewBody"></div>
    <div class="email-ftr">
      <button class="btn btn-out btn-sm" onclick="closeEmailModal()">Cancel</button>
      <button class="btn btn-dark btn-sm" id="confirmSendBtn">✉ Confirm & Send</button>
    </div>
  </div>
</div>

<div class="pdf-overlay" id="pdfModal"><div class="pdf-modal">
  <div class="pdf-hdr"><h3>Total Deposit Receipt</h3><button class="btn btn-out btn-sm" onclick="closePdf()">✕</button></div>
  <div class="pdf-body"><iframe id="pdfFrame"></iframe></div>
  <div class="pdf-ftr"><a id="pdfDl" class="btn btn-dark btn-sm" target="_blank">Open in New Tab</a></div>
</div></div>

<script src="/js/shared.js"></script>
<script>
let currentUid,propData=null,allOpts;
document.addEventListener('DOMContentLoaded',async()=>{
  try{
    const cr=await fetch(`${API}/api/config`);allOpts=(await cr.json()).options;
    const ur=await fetch(`${API}/api/final/uids`);const uids=await ur.json();
    fillUidSelect(document.getElementById('selUid'),uids);makeSearchable(document.getElementById('selUid'));
    const p=new URLSearchParams(location.search);if(p.get('uid')){document.getElementById('selUid').value=p.get('uid');loadData()}
  }catch(e){toast('Failed','err')}
});

document.getElementById('loadBtn').addEventListener('click',loadData);
async function loadData(){const uid=document.getElementById('selUid').value;if(!uid){toast('Select UID','warn');return}
  const st=document.getElementById('pfSt');st.className='pf-st show';st.textContent='Loading...';
  try{const r=await fetch(`${API}/api/final/prefill/${uid}`);if(!r.ok)throw new Error((await r.json()).error);propData=await r.json();
    document.getElementById('fUid').value=propData.uid;currentUid=uid;
    const pg=Number(propData.performance_guarantee)||0;const tk=Number(propData.deal_token_amount)||0;const rem=pg-tk;
    document.getElementById('pgAmt').value=pg?'₹ '+pg.toLocaleString('en-IN'):'—';
    document.getElementById('tkAmt').value=tk?'₹ '+tk.toLocaleString('en-IN'):'—';
    document.getElementById('remAmt').value=rem>0?'₹ '+rem.toLocaleString('en-IN'):'₹ 0';
    document.getElementById('remHidden').value=rem>0?rem:0;
    const sv=(n,v)=>{const el=document.querySelector(`[name="${n}"]`);if(el&&v!=null)el.value=v};
    // Key Handover Date — always show, prefill if exists
    if(propData.key_handover_date)document.getElementById('hdDate').value=propData.key_handover_date.split('T')[0];
    // Show owner emails fetched from Form 4
    const emails=[];
    if(propData.owner_email)emails.push(`<div><strong>${propData.owner_broker_name||'Owner'}:</strong> ${propData.owner_email}</div>`);
    if(propData.co_owner_email)emails.push(`<div><strong>${propData.co_owner||'Co-owner'}:</strong> ${propData.co_owner_email}</div>`);
    if(propData.third_owner_email)emails.push(`<div><strong>3rd Owner:</strong> ${propData.third_owner_email}</div>`);
    if(propData.broker_email)emails.push(`<div><strong>Broker:</strong> ${propData.broker_email}</div>`);
    if(emails.length){document.getElementById('ownerEmailsList').innerHTML=emails.join('');document.getElementById('ownerEmailsCard').style.display='block'}
    else{document.getElementById('ownerEmailsCard').style.display='none'}
    document.getElementById('pdfBtn').disabled=!propData.final_submitted_at;
    document.getElementById('emailBtn').disabled=!propData.final_submitted_at;
    document.getElementById('finalForm').style.display='block';
    st.className='pf-st show ok';st.textContent=`Loaded: ${uid}${propData.final_submitted_at?' (Submitted)':''}`;
  }catch(e){st.className='pf-st show err';st.textContent=e.message;document.getElementById('finalForm').style.display='none'}}

document.getElementById('submitBtn').addEventListener('click',()=>{
  const{valid,missing}=validateForm('finalForm');if(!valid){toast(`Missing: ${missing.slice(0,4).join(', ')}`,'err');return}
  const fd=new FormData(document.getElementById('finalForm'));const body=Object.fromEntries(fd.entries());
  ['remaining_amount'].forEach(k=>{if(body[k])body[k]=body[k].replace(/,/g,'')});
  submitBtn(document.getElementById('submitBtn'),async()=>{
    const r=await fetch(`${API}/api/final/submit`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    const res=await r.json();if(!r.ok)throw new Error(res.error);
    document.getElementById('pdfBtn').disabled=false;document.getElementById('emailBtn').disabled=false;toast('Submitted! Payment Receipt ready.','ok',5000)});
});

document.getElementById('pdfBtn').addEventListener('click',()=>{if(!currentUid)return;
  const url=`${API}/api/final/pdf/${currentUid}`;document.getElementById('pdfFrame').src=url;
  document.getElementById('pdfDl').href=url;document.getElementById('pdfModal').classList.add('open')});
function closePdf(){document.getElementById('pdfModal').classList.remove('open');document.getElementById('pdfFrame').src=''}
document.getElementById('pdfModal').addEventListener('click',e=>{if(e.target===e.currentTarget)closePdf()});

// Send email to owner — show preview first
document.getElementById('emailBtn').addEventListener('click',()=>{
  if(!currentUid){toast('Load a property first','warn');return}
  if(!propData?.owner_email){toast('Owner email not found. Set it in Deal Terms form.','err');return}
  const sellerName=propData.owner_broker_name||'Owner';
  const addr=[propData.unit_no,propData.tower_no,propData.society_name,propData.locality,propData.city].filter(Boolean).join(', ');
  const hdDate=document.getElementById('hdDate').value?new Date(document.getElementById('hdDate').value+'T00:00').toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'}):'—';
  const toList=[propData.owner_email,propData.co_owner_email,propData.third_owner_email].filter(Boolean).join(', ');
  const ccList=['supply@openhouse.in','akash.teotia@openhouse.in','saurabh@openhouse.in','accounts@openhouse.in',propData.broker_email].filter(Boolean).join(', ');
  const html=`<div style="font-size:13px;line-height:1.8">
<p><strong>To:</strong> ${toList}</p>
${ccList?`<p><strong>CC:</strong> ${ccList}</p>`:''}
<p><strong>Subject:</strong> ${currentUid} - Openhouse Offer | ${propData?.unit_no||''} ${propData?.tower_no||''} - ${propData?.society_name||'Property'} | ${sellerName}</p>
<hr style="border:none;border-top:1px solid var(--bd);margin:10px 0">
<p>Dear <strong>${sellerName}</strong>,</p>
<p>This email serves as official confirmation that we collected the keys to your property <strong>${addr}</strong> on <strong>${hdDate}</strong>. Consequently, the timeline of the agreement will commence from <strong>${hdDate}</strong>. Please consider this message as formal notification regarding the start of our timeline.</p>
</div>`;
  document.getElementById('emailPreviewBody').innerHTML=html;
  document.getElementById('emailModal').classList.add('open');
});
function closeEmailModal(){document.getElementById('emailModal').classList.remove('open')}
document.getElementById('emailModal').addEventListener('click',e=>{if(e.target===e.currentTarget)closeEmailModal()});
document.getElementById('confirmSendBtn').addEventListener('click',async()=>{
  const btn=document.getElementById('confirmSendBtn');btn.disabled=true;btn.textContent='Sending...';
  try{
    const r=await fetch(`${API}/api/final/send-email/${currentUid}`,{method:'POST',headers:{'Content-Type':'application/json'}});
    const d=await r.json();if(!r.ok)throw new Error(d.error);
    toast('Email sent to owner!','ok',5000);closeEmailModal();
  }catch(e){toast(e.message||'Failed','err');
    if(e.message&&e.message.includes('log out'))toast('Please logout and login again','warn',8000);
  }finally{btn.disabled=false;btn.textContent='✉ Confirm & Send'}
});
</script>
</body></html>
