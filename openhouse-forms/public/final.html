<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"><title>Openhouse — Final Form</title><link rel="stylesheet" href="/css/styles.css"></head>
<body>
<header class="hdr"><div><div class="logo">OPENHOUSE</div><div class="logo-sub">Final Form</div></div></header>
<div class="ctn">
  <div class="card">
    <div class="card-t">Load Property</div>
    <div class="load-row">
      <div class="fg"><label>UID <span class="req">*</span></label><select id="selUid" style="font-family:var(--mono)"></select></div>
      <button type="button" class="btn btn-dark btn-sm" id="loadBtn">Load</button>
    </div>
    <div class="pf-st" id="pfSt"></div>
  </div>

  <form id="finalForm" style="display:none">
    <input type="hidden" name="uid" id="fUid">

    <!-- Remaining Amount -->
    <div class="card"><div class="card-t">Remaining Amount</div>
      <div class="fg"><label>Remaining Amount (₹) <span class="req">*</span></label><input type="number" name="remaining_amount" placeholder="e.g. 4500000" required><div class="err-msg">Required</div></div>
    </div>

    <!-- NEFT Details -->
    <div class="card" style="border-left:3px solid var(--ac2)">
      <div class="card-t">💳 NEFT / Payment Details</div>
      <div class="r2">
        <div class="fg"><label>Bank A/C No. <span class="req">*</span></label><input type="text" name="bank_account_number" id="neftAc" required><div class="err-msg">Required</div></div>
        <div class="fg"><label>Bank Name <span class="req">*</span></label><input type="text" name="bank_name" id="neftBank" required><div class="err-msg">Required</div></div>
      </div>
      <div class="fg"><label>IFSC Code <span class="req">*</span></label><input type="text" name="ifsc_code" id="neftIfsc" class="input-md" required><div class="err-msg">Required</div></div>
      <div class="r2">
        <div class="fg"><label>Transfer Date <span class="req">*</span></label><input type="date" name="token_transfer_date" required><div class="err-msg">Required</div></div>
        <div class="fg"><label>NEFT Reference <span class="req">*</span></label><input type="text" name="neft_reference" required><div class="err-msg">Required</div></div>
      </div>
    </div>

    <div class="btn-row">
      <button type="button" class="btn btn-dark" id="submitBtn">Submit Final</button>
      <div><button type="button" class="btn btn-grn" id="pdfBtn" disabled>📄 PDF</button></div>
    </div>

    <!-- PDF Preview Cards (shown after submit) -->
    <div class="preview-section" id="pdfCards">
      <div class="preview-card"><div class="pc-t">📍 Property Details</div><div id="pcProp"></div></div>
      <div class="preview-card"><div class="pc-t">💰 Financial Summary</div><div id="pcMoney"></div></div>
      <div class="preview-card"><div class="pc-t">🏦 Account & Payment</div><div id="pcAccount"></div></div>
    </div>
  </form>
</div>

<!-- PDF Modal -->
<div class="pdf-overlay" id="pdfModal"><div class="pdf-modal">
  <div class="pdf-hdr"><h3>Final Token Receipt</h3><button class="btn btn-out btn-sm" onclick="closePdf()">✕</button></div>
  <div class="pdf-body"><iframe id="pdfFrame"></iframe></div>
  <div class="pdf-ftr"><a id="pdfDl" class="btn btn-dark btn-sm" target="_blank">↗ Open Full Page</a></div>
</div></div>

<script src="/js/shared.js"></script>
<script>
let currentUid,propData=null,isSubmitted=false;
document.addEventListener('DOMContentLoaded',async()=>{
  try{
    const ur=await fetch(`${API}/api/final/uids`);const uids=await ur.json();
    const sel=document.getElementById('selUid');sel.innerHTML='<option value="">Select UID...</option>';
    uids.forEach(u=>{const s=u.final_submitted_at?'✅':'📝';sel.innerHTML+=`<option value="${u.uid}">${u.uid} — ${u.society_name||''} [${s}]</option>`});
    makeSearchable(sel);const p=new URLSearchParams(location.search);if(p.get('uid')){sel.value=p.get('uid');loadData()}
  }catch(e){toast('Failed','err')}
});

document.getElementById('loadBtn').addEventListener('click',loadData);
async function loadData(){
  const uid=document.getElementById('selUid').value;if(!uid){toast('Select UID','warn');return}
  const st=document.getElementById('pfSt');st.className='pf-st show';st.textContent='Loading...';
  try{const r=await fetch(`${API}/api/final/prefill/${uid}`);if(!r.ok)throw new Error((await r.json()).error);propData=await r.json();
    document.getElementById('fUid').value=propData.uid;currentUid=uid;
    const sv=(n,v)=>{const el=document.querySelector(`[name="${n}"]`);if(el&&v!=null)el.value=v};
    sv('remaining_amount',propData.remaining_amount);
    // NEFT - prefill from cheque data if NEFT not yet filled
    sv('bank_account_number',propData.bank_account_number||propData.cheque_account_number);
    sv('bank_name',propData.bank_name||propData.cheque_bank_name);
    sv('ifsc_code',propData.ifsc_code||propData.cheque_ifsc);
    if(propData.token_transfer_date)sv('token_transfer_date',propData.token_transfer_date.split('T')[0]);sv('neft_reference',propData.neft_reference);
    isSubmitted=!!propData.final_submitted_at;
    document.getElementById('pdfBtn').disabled=!isSubmitted;
    if(isSubmitted)buildCards();
    document.getElementById('finalForm').style.display='block';
    st.className='pf-st show ok';st.textContent=`✓ Loaded: ${uid}${propData.final_submitted_at?' (Final)':''}`;
  }catch(e){st.className='pf-st show err';st.textContent=`✗ ${e.message}`;document.getElementById('finalForm').style.display='none'}
}

function pRow(l,v){return v?`<div class="pc-row"><span class="pc-l">${l}</span><span class="pc-v">${v}</span></div>`:''}
function fmt(v){return v?'₹ '+Number(v).toLocaleString('en-IN'):'—'}
function buildCards(){
  if(!propData)return;const d=propData;
  document.getElementById('pcProp').innerHTML=pRow('UID',d.uid)+pRow('Society',d.society_name)+pRow('Locality',d.locality)+
    pRow('Unit',d.unit_no)+pRow('Tower',d.tower_no)+pRow('Floor',d.floor)+pRow('Config',d.configuration)+
    pRow('Area',d.area_sqft?d.area_sqft+' sqft':'')+pRow('Owner',d.owner_broker_name)+pRow('Phone',d.contact_no);
  let rentI=d.rent_payable_initial_period;let rentG=d.rent_payable_grace_period;
  if(rentI&&rentI!=='N/A')rentI=fmt(rentI);if(rentG&&rentG!=='N/A')rentG=fmt(rentG);
  const ra=document.querySelector('[name="remaining_amount"]').value;
  document.getElementById('pcMoney').innerHTML=
    pRow('Token Requested',fmt(d.token_amount_requested))+pRow('Deal Token',fmt(d.deal_token_amount))+
    pRow('Remaining Amount',ra?fmt(ra):'—')+pRow('Guaranteed Sale Price',d.guaranteed_sale_price?'₹ '+d.guaranteed_sale_price+' L':'—')+
    pRow('Initial Period',d.initial_period?d.initial_period+' days':'')+pRow('Rent (Initial)',rentI||'—')+
    pRow('Grace Period',d.grace_period?d.grace_period+' days':'')+pRow('Rent (Grace)',rentG||'—')+
    pRow('Outstanding Loan',fmt(d.outstanding_loan));
  const na=document.getElementById('neftAc').value,nb=document.getElementById('neftBank').value,ni=document.getElementById('neftIfsc').value,
    td=document.querySelector('[name="token_transfer_date"]').value,nr=document.querySelector('[name="neft_reference"]').value;
  document.getElementById('pcAccount').innerHTML=
    pRow('Bank Name',nb||'—')+pRow('A/C No.',na||'—')+pRow('IFSC',ni||'—')+
    pRow('Transfer Date',td||'—')+pRow('NEFT Ref',nr||'—');
  document.getElementById('pdfCards').classList.add('show');
}

document.getElementById('submitBtn').addEventListener('click',()=>{
  const{valid,missing}=validateForm('finalForm');if(!valid){toast(`Missing: ${missing.slice(0,4).join(', ')}`,'err');return}
  const fd=new FormData(document.getElementById('finalForm'));const body=Object.fromEntries(fd.entries());
  submitBtn(document.getElementById('submitBtn'),async()=>{
    const r=await fetch(`${API}/api/final/submit`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    const res=await r.json();if(!r.ok)throw new Error(res.error);isSubmitted=true;document.getElementById('pdfBtn').disabled=false;
    // Refresh propData
    const r2=await fetch(`${API}/api/final/prefill/${currentUid}`);propData=await r2.json();
    buildCards();toast('Final submitted! PDF ready.','ok',5000)});
});

document.getElementById('pdfBtn').addEventListener('click',()=>{if(!isSubmitted||!currentUid)return;
  const url=`${API}/api/final/pdf/${currentUid}`;document.getElementById('pdfFrame').src=url;
  document.getElementById('pdfDl').href=url;
  document.getElementById('pdfModal').classList.add('open')});
function closePdf(){document.getElementById('pdfModal').classList.remove('open');document.getElementById('pdfFrame').src=''}
document.getElementById('pdfModal').addEventListener('click',e=>{if(e.target===e.currentTarget)closePdf()});
</script>
</body></html>
