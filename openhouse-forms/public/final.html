<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"><title>Openhouse — Pending Security Deposit</title><link rel="stylesheet" href="/css/styles.css">
<style>
.pu-item{border:2px dashed var(--bd);border-radius:8px;padding:12px;text-align:center;cursor:pointer;transition:.15s;background:var(--bg);position:relative;min-height:90px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px}
.pu-item:hover{border-color:var(--ac);background:rgba(0,0,0,.01)}
.pu-item.uploaded{border-color:var(--grn);border-style:solid;background:#f0fdf4}
.pu-item .pu-icon{font-size:20px;color:var(--tx3)}
.pu-item.uploaded .pu-icon{color:var(--grn)}
.pu-item .pu-label{font-size:10px;color:var(--tx3);font-weight:500}
.pu-item.uploaded .pu-label{color:var(--grn)}
.pu-item .pu-link{font-size:9px;color:var(--ac2);text-decoration:underline;margin-top:2px}
</style></head>
<body>
<header class="hdr">
  <a href="/" class="hdr-logo"><img src="/images/logo_2.png" alt="Openhouse" style="height:32px"></a>
  <div class="hdr-center"><div class="form-name">Pending Security Deposit</div></div>
  <div class="hdr-right"></div>
</header>
<div class="ctn">
  <div class="card"><div class="card-t">Load Property</div>
    <div class="load-row"><div class="fg"><label>UID</label><select id="selUid" style="font-family:var(--mono)"></select></div>
      <button type="button" class="btn btn-dark btn-sm" id="loadBtn">Load</button></div>
    <div class="pf-st" id="pfSt"></div></div>

  <form id="finalForm" style="display:none"><input type="hidden" name="uid" id="fUid">
    <div class="card"><div class="card-t">Amount Summary</div>
      <div class="r3">
        <div class="fg"><label>Performance Guarantee</label><input type="text" id="pgAmt" class="pre" readonly></div>
        <div class="fg"><label>Token Paid</label><input type="text" id="tkAmt" class="pre" readonly></div>
        <div class="fg"><label>Remaining Amount</label><input type="text" id="remAmt" class="pre" readonly style="font-weight:700;color:var(--ac)"></div>
      </div>
      <input type="hidden" name="remaining_amount" id="remHidden">
    </div>

    <div class="card"><div class="card-t">Loan Details</div>
      <div class="fg"><label>Any Loan? <span class="req">*</span></label>
        <div class="radios"><label><input type="radio" name="has_loan" value="Yes" id="loanYes"><span>Yes</span></label><label><input type="radio" name="has_loan" value="No" id="loanNo"><span>No</span></label></div></div>
      <div id="loanFields" style="display:none">
        <div class="r2">
          <div class="fg"><label>Applicant Name</label><input type="text" name="loan_applicant_name" id="loanApplicant"></div>
          <div class="fg"><label>Co-applicant Name</label><input type="text" name="loan_co_applicant_name" id="loanCoApplicant"></div>
        </div>
        <label class="na-toggle" style="margin-bottom:10px"><input type="checkbox" id="loanCopy"><span>Same as bank details below</span></label>
        <div id="loanBankFields">
          <div class="fg"><label>Bank Name</label><select name="bank_name_loan" id="selBankLoan"><option value="">Select bank...</option></select>
            <input type="text" name="bank_name_loan_other" id="bankOther" style="display:none;margin-top:4px"></div>
          <div class="fg"><label>Loan A/C Number</label><input type="text" name="loan_account_number" id="loanAc" inputmode="numeric" pattern="[0-9]*" oninput="this.value=this.value.replace(/\D/g,'')"></div>
        </div>
        <div class="fg"><label>Outstanding Loan (in ₹)</label><input type="number" name="outstanding_loan" id="loanAmt"></div>
        <div class="fg"><label>Willing to pay loan?</label>
          <div class="radios"><label><input type="radio" name="loan_pay_willingness" value="Yes"><span>Yes</span></label><label><input type="radio" name="loan_pay_willingness" value="No"><span>No</span></label></div></div>
      </div>
    </div>

    <div class="fg" id="hdWrap" style="display:none;padding:0 14px;margin-bottom:14px"><div class="card" style="margin:0"><label>Key Handover Date</label><input type="date" name="key_handover_date" id="hdDate"></div></div>

    <div class="card"><div class="fg"><label>Date of AMA</label><input type="date" name="ama_date" id="amaDate"></div></div>

    <div class="card"><div class="card-t">Owner Documents Upload</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:6px">
        <div class="pu-item" id="pu_ownerPan" onclick="document.getElementById('fi_owner_pan').click()">
          <div class="pu-icon">📄</div><div class="pu-label">PAN Card</div>
          <input type="file" id="fi_owner_pan" accept="image/*,.pdf" style="display:none" onchange="uploadOwnerDoc(this,'owner_pan')">
        </div>
        <div class="pu-item" id="pu_ownerAadhaarFront" onclick="document.getElementById('fi_owner_aadhaar_front').click()">
          <div class="pu-icon">📄</div><div class="pu-label">Aadhaar Card Front</div>
          <input type="file" id="fi_owner_aadhaar_front" accept="image/*,.pdf" style="display:none" onchange="uploadOwnerDoc(this,'owner_aadhaar_front')">
        </div>
        <div class="pu-item" id="pu_ownerAadhaarBack" onclick="document.getElementById('fi_owner_aadhaar_back').click()">
          <div class="pu-icon">📄</div><div class="pu-label">Aadhaar Card Back</div>
          <input type="file" id="fi_owner_aadhaar_back" accept="image/*,.pdf" style="display:none" onchange="uploadOwnerDoc(this,'owner_aadhaar_back')">
        </div>
        <div class="pu-item" id="pu_ownerPropDoc" onclick="document.getElementById('fi_owner_property_doc').click()">
          <div class="pu-icon">📄</div><div class="pu-label">Property Ownership Doc</div>
          <input type="file" id="fi_owner_property_doc" accept="image/*,.pdf" style="display:none" onchange="uploadOwnerDoc(this,'owner_property_doc')">
        </div>
      </div>
    </div>

    <div class="card" style="border-left:3px solid var(--ac2)"><div class="card-t">Payment Details</div>
      <div class="r2">
        <div class="fg"><label>Bank A/C No. <span class="req">*</span></label><input type="text" name="bank_account_number" id="neftAc" inputmode="numeric" pattern="[0-9]*" oninput="this.value=this.value.replace(/\D/g,'')" required><div class="err-msg">Required</div></div>
        <div class="fg"><label>Bank Name <span class="req">*</span></label><input type="text" name="bank_name" id="neftBank" required><div class="err-msg">Required</div></div>
      </div>
      <div class="fg"><label>IFSC Code <span class="req">*</span></label><input type="text" name="ifsc_code" id="neftIfsc" class="input-md" required><div class="err-msg">Required</div></div>
      <div class="r2">
        <div class="fg"><label>Transfer Date <span class="req">*</span></label><input type="date" name="token_transfer_date" id="fDate" required><div class="err-msg">Required</div></div>
        <div class="fg"><label>NEFT Reference <span class="req">*</span></label><input type="text" name="neft_reference" required style="text-transform:uppercase"><div class="err-msg">Required</div></div>
      </div></div>

    <div class="btn-row">
      <button type="button" class="btn btn-dark" id="submitBtn">Submit</button>
      <button type="button" class="btn btn-grn" id="pdfBtn" disabled>PG Receipt</button>
    </div>
  </form>
</div>

<div class="pdf-overlay" id="pdfModal"><div class="pdf-modal">
  <div class="pdf-hdr"><h3>Performance Guarantee Receipt</h3><button class="btn btn-out btn-sm" onclick="closePdf()">✕</button></div>
  <div class="pdf-body"><iframe id="pdfFrame"></iframe></div>
  <div class="pdf-ftr"><a id="pdfDl" class="btn btn-dark btn-sm" target="_blank">Open in New Tab</a></div>
</div></div>

<script src="/js/shared.js"></script>
<script>
let currentUid,propData=null,allOpts;
const ownerDocUrls={owner_pan:'',owner_aadhaar_front:'',owner_aadhaar_back:'',owner_property_doc:''};
const OWNER_DOC_COL={owner_pan:'owner_pan_url',owner_aadhaar_front:'owner_aadhaar_front_url',owner_aadhaar_back:'owner_aadhaar_back_url',owner_property_doc:'owner_property_doc_url'};
const OWNER_DOC_ITEM={owner_pan:'pu_ownerPan',owner_aadhaar_front:'pu_ownerAadhaarFront',owner_aadhaar_back:'pu_ownerAadhaarBack',owner_property_doc:'pu_ownerPropDoc'};
const OWNER_DOC_LABEL={owner_pan:'PAN Card',owner_aadhaar_front:'Aadhaar Front',owner_aadhaar_back:'Aadhaar Back',owner_property_doc:'Property Ownership Doc'};
let ownerCloudCfg=null;
fetch(`${API}/api/config/cloudinary`).then(r=>r.json()).then(c=>ownerCloudCfg=c).catch(()=>{});
async function uploadOwnerDoc(input,key){
  if(!input.files.length)return;if(!ownerCloudCfg){toast('Upload not ready','warn');return}
  const file=input.files[0];if(file.size>10*1024*1024){toast('File exceeds 10MB','err');return}
  const item=document.getElementById(OWNER_DOC_ITEM[key]);item.querySelector('.pu-label').textContent='Uploading...';
  try{
    const ownerName=(propData?.owner_broker_name||'owner').replace(/[^a-zA-Z0-9 ]/g,'').replace(/\s+/g,'_');
    const fd=new FormData();fd.append('file',file);fd.append('upload_preset',ownerCloudCfg.uploadPreset);fd.append('folder',`owner-docs/${ownerName}`);
    const r=await fetch(`https://api.cloudinary.com/v1_1/${ownerCloudCfg.cloudName}/auto/upload`,{method:'POST',body:fd});
    const d=await r.json();if(!d.secure_url)throw new Error('Upload failed');
    ownerDocUrls[key]=d.secure_url;item.classList.add('uploaded');
    item.querySelector('.pu-label').textContent=OWNER_DOC_LABEL[key]+' ✓';
    let link=item.querySelector('.pu-link');if(!link){link=document.createElement('a');link.className='pu-link';link.target='_blank';link.textContent='View';link.onclick=e=>e.stopPropagation();item.appendChild(link)}
    link.href=d.secure_url;toast('Uploaded','ok');
  }catch(e){toast('Upload failed','err');item.querySelector('.pu-label').textContent=OWNER_DOC_LABEL[key]}
  input.value='';
}
document.addEventListener('DOMContentLoaded',async()=>{
  try{
    const cr=await fetch(`${API}/api/config`);allOpts=(await cr.json()).options;
    const bankSel=document.getElementById('selBankLoan');
    allOpts.banks.forEach(b=>{bankSel.innerHTML+=`<option value="${b}">${b}</option>`});
    bankSel.addEventListener('change',()=>{document.getElementById('bankOther').style.display=bankSel.value==='Others'?'block':'none'});
    // Loan Yes/No toggle
    document.querySelectorAll('input[name="has_loan"]').forEach(r=>{
      r.addEventListener('change',function(){
        document.getElementById('loanFields').style.display=this.value==='Yes'?'block':'none';
        if(this.value==='Yes'){
          if(!document.getElementById('loanApplicant').value)document.getElementById('loanApplicant').value=propData?.owner_broker_name||'';
          if(!document.getElementById('loanCoApplicant').value)document.getElementById('loanCoApplicant').value=propData?.co_owner||'';
        }else{
          document.getElementById('loanApplicant').value='';
          document.getElementById('loanCoApplicant').value='';
          document.querySelector('[name="outstanding_loan"]').value='';
          document.querySelector('[name="loan_account_number"]').value='';
          document.getElementById('selBankLoan').value='';
          document.querySelectorAll('input[name="loan_pay_willingness"]').forEach(x=>x.checked=false);
        }
      });
    });
    // "Same as bank details below" — copies from Payment Details section
    document.getElementById('loanCopy').addEventListener('change',function(){
      if(this.checked){document.getElementById('loanBankFields').style.display='none';
        const bk=document.getElementById('neftBank').value;const ac=document.getElementById('neftAc').value;
        if(bk)document.getElementById('selBankLoan').value=bk;
        if(ac)document.querySelector('[name="loan_account_number"]').value=ac;
      }else{document.getElementById('loanBankFields').style.display='block'}});
    const ur=await fetch(`${API}/api/final/uids`);const uids=await ur.json();
    fillUidSelect(document.getElementById('selUid'),uids);makeSearchable(document.getElementById('selUid'));
    noFutureDate('fDate');
    const p=new URLSearchParams(location.search);if(p.get('uid')){document.getElementById('selUid').value=p.get('uid');loadData()}
  }catch(e){toast('Failed','err')}
});

document.getElementById('loadBtn').addEventListener('click',loadData);
async function loadData(){const uid=document.getElementById('selUid').value;if(!uid){toast('Select UID','warn');return}
  const st=document.getElementById('pfSt');st.className='pf-st show';st.textContent='Loading...';
  try{const r=await fetch(`${API}/api/final/prefill/${uid}`);if(!r.ok)throw new Error((await r.json()).error);propData=await r.json();
    document.getElementById('fUid').value=propData.uid;currentUid=uid;
    const pg=Number(propData.performance_guarantee)||0;const tk=Number(propData.deal_token_amount)||0;const rem=pg-tk;
    document.getElementById('pgAmt').value=pg?'₹ '+pg.toLocaleString('en-IN'):'—';
    document.getElementById('tkAmt').value=tk?'₹ '+tk.toLocaleString('en-IN'):'—';
    document.getElementById('remAmt').value=rem>0?'₹ '+rem.toLocaleString('en-IN'):'₹ 0';
    document.getElementById('remHidden').value=rem>0?rem:0;
    // Prefill bank from Form 4
    document.getElementById('neftAc').value=propData.bank_account_number||propData.deal_bank_account_number||propData.cheque_account_number||'';
    document.getElementById('neftBank').value=propData.bank_name||propData.deal_bank_name||propData.cheque_bank_name||'';
    document.getElementById('neftIfsc').value=propData.ifsc_code||propData.deal_ifsc_code||propData.cheque_ifsc||'';
    const sv=(n,v)=>{const el=document.querySelector(`[name="${n}"]`);if(el&&v!=null)el.value=v};
    const sr=(n,v)=>{if(!v)return;const rb=document.querySelector(`input[name="${n}"][value="${v}"]`);if(rb)rb.checked=true};
    if(propData.token_transfer_date)sv('token_transfer_date',propData.token_transfer_date.split('T')[0]);
    sv('neft_reference',propData.neft_reference);
    // Prefill loan from DB (saved from Form 3)
    const hasLoan=propData.has_loan||((propData.bank_name_loan||propData.outstanding_loan||propData.loan_account_number)?'Yes':'No');
    const loanRadio=document.querySelector(`input[name="has_loan"][value="${hasLoan}"]`);
    if(loanRadio){loanRadio.checked=true;document.getElementById('loanFields').style.display=hasLoan==='Yes'?'block':'none'}
    document.getElementById('loanApplicant').value=propData.loan_applicant_name||propData.owner_broker_name||'';
    document.getElementById('loanCoApplicant').value=propData.loan_co_applicant_name||propData.co_owner||'';
    if(propData.bank_name_loan){const bs=document.getElementById('selBankLoan');bs.value=propData.bank_name_loan;if(propData.bank_name_loan==='Others')document.getElementById('bankOther').style.display='block'}
    sv('loan_account_number',propData.loan_account_number);sv('outstanding_loan',propData.outstanding_loan);
    sr('loan_pay_willingness',propData.loan_pay_willingness);
    // Key Handover Date — show only if exists
    if(propData.key_handover_date){document.getElementById('hdWrap').style.display='block';document.getElementById('hdDate').value=propData.key_handover_date.split('T')[0]}else{document.getElementById('hdWrap').style.display='none';document.getElementById('hdDate').value=''}
    // Date of AMA prefill
    if(propData.ama_date)document.getElementById('amaDate').value=propData.ama_date.split('T')[0];
    // Owner document uploads prefill
    for(const[key,col]of Object.entries(OWNER_DOC_COL)){
      ownerDocUrls[key]=propData[col]||'';
      const item=document.getElementById(OWNER_DOC_ITEM[key]);
      item.classList.remove('uploaded');item.querySelector('.pu-label').textContent=OWNER_DOC_LABEL[key];
      const oldLink=item.querySelector('.pu-link');if(oldLink)oldLink.remove();
      if(propData[col]){item.classList.add('uploaded');item.querySelector('.pu-label').textContent=OWNER_DOC_LABEL[key]+' ✓';
        const link=document.createElement('a');link.className='pu-link';link.target='_blank';link.textContent='View';link.href=propData[col];link.onclick=e=>e.stopPropagation();item.appendChild(link)}
    }
    document.getElementById('pdfBtn').disabled=!propData.final_submitted_at;
    document.getElementById('finalForm').style.display='block';
    st.className='pf-st show ok';st.textContent=`Loaded: ${uid}${propData.final_submitted_at?' (Submitted)':''}`;
  }catch(e){st.className='pf-st show err';st.textContent=e.message;document.getElementById('finalForm').style.display='none'}}

document.getElementById('submitBtn').addEventListener('click',()=>{
  const{valid,missing}=validateForm('finalForm');if(!valid){toast(`Missing: ${missing.slice(0,4).join(', ')}`,'err');return}
  if(!getRadio('has_loan')){toast('Select Any Loan?','err');return}
  if(getRadio('has_loan')==='Yes'&&!getRadio('loan_pay_willingness')){toast('Select Willing to pay loan','err');return}
  const fd=new FormData(document.getElementById('finalForm'));const body=Object.fromEntries(fd.entries());
  body.has_loan=getRadio('has_loan')||'No';
  body.loan_pay_willingness=getRadio('loan_pay_willingness');
  if(body.has_loan==='No'){body.outstanding_loan='';body.bank_name_loan='';body.loan_account_number='';body.loan_pay_willingness='';body.loan_applicant_name='';body.loan_co_applicant_name=''}
  if(body.bank_name_loan==='Others')body.bank_name_loan=document.getElementById('bankOther').value||'Others';
  ['remaining_amount','outstanding_loan'].forEach(k=>{if(body[k])body[k]=body[k].replace(/,/g,'')});
  for(const[key,col]of Object.entries(OWNER_DOC_COL)){body[col]=ownerDocUrls[key]||null}
  submitBtn(document.getElementById('submitBtn'),async()=>{
    const r=await fetch(`${API}/api/final/submit`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    const res=await r.json();if(!r.ok)throw new Error(res.error);
    document.getElementById('pdfBtn').disabled=false;toast('Submitted! PG Receipt ready.','ok',5000)});
});

document.getElementById('pdfBtn').addEventListener('click',()=>{if(!currentUid)return;
  const url=`${API}/api/final/pdf/${currentUid}`;document.getElementById('pdfFrame').src=url;
  document.getElementById('pdfDl').href=url;document.getElementById('pdfModal').classList.add('open')});
function closePdf(){document.getElementById('pdfModal').classList.remove('open');document.getElementById('pdfFrame').src=''}
document.getElementById('pdfModal').addEventListener('click',e=>{if(e.target===e.currentTarget)closePdf()});
</script>
</body></html>
