<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"><title>Openhouse — Login</title><link rel="stylesheet" href="/css/styles.css">
<style>
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:calc(100vh - 60px);padding:20px}
.login-card{width:100%;max-width:380px;text-align:center}
.login-icon{display:flex;align-items:center;justify-content:center;margin:0 auto 16px}.login-icon svg{width:32px;height:32px;fill:#b8985a}
.login-title{font-size:22px;font-weight:800;letter-spacing:1px;margin-bottom:4px}
.login-sub{font-size:12px;color:var(--tx3);margin-bottom:24px;line-height:1.5}
.google-btn{display:inline-flex;align-items:center;gap:10px;padding:12px 28px;border:1.5px solid var(--bd);border-radius:var(--r);background:var(--sf);font-family:var(--font);font-size:14px;font-weight:600;color:var(--tx);cursor:pointer;transition:.15s;text-decoration:none;box-shadow:var(--sh)}
.google-btn:hover{border-color:var(--ac);box-shadow:0 4px 12px rgba(0,0,0,.08);transform:translateY(-1px)}
.google-btn:active{transform:translateY(0)}
.google-btn svg{width:20px;height:20px}
.login-error{background:var(--rbg);color:var(--red);border:1px solid #fecaca;border-radius:var(--r);padding:10px 14px;font-size:12px;margin-bottom:16px;display:none}
.login-error.show{display:block}
.login-note{font-size:10px;color:var(--tx3);margin-top:20px;line-height:1.5}
</style></head>
<body>
<header class="hdr">
  <a href="/" class="hdr-logo"><img src="/images/logo_2.png" alt="Openhouse" style="height:32px"></a>
  <div class="hdr-right"></div>
</header>
<div class="login-wrap"><div class="login-card card" style="padding:30px 24px">
  <div class="login-icon"><img src="/images/logo.png" alt="Openhouse" style="height:32px"></div>
  <div class="login-title">Welcome</div>
  <div class="login-sub">Sign in with your authorized Google account to access Openhouse forms.</div>

  <div class="login-error" id="errMsg"></div>

  <a href="/auth/google" class="google-btn" id="gBtn">
    <svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
    Sign in with Google
  </a>

  <div class="login-note">Only pre-approved email addresses can access this system.<br>Contact your administrator if you need access.</div>
</div></div>

<script>
const params=new URLSearchParams(location.search);const err=document.getElementById('errMsg');
if(params.get('error')==='failed'){err.textContent='Access denied. Your email is not in the approved list. Contact your admin.';err.classList.add('show')}
if(params.get('error')==='disabled'){err.textContent='Your account has been disabled. Contact your admin.';err.classList.add('show')}
</script>
</body></html>
