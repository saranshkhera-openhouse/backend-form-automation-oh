<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"><title>Openhouse — CP Bill Generation</title><link rel="stylesheet" href="/css/styles.css">
<style>
.photo-upload{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:6px}
.pu-item{border:2px dashed var(--bd);border-radius:8px;padding:12px;text-align:center;cursor:pointer;transition:.15s;background:var(--bg);position:relative;min-height:90px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px}
.pu-item:hover{border-color:var(--ac);background:rgba(0,0,0,.01)}
.pu-item.uploaded{border-color:var(--grn);border-style:solid;background:#f0fdf4}
.pu-item .pu-icon{font-size:20px;color:var(--tx3)}
.pu-item.uploaded .pu-icon{color:var(--grn)}
.pu-item .pu-label{font-size:10px;color:var(--tx3);font-weight:500}
.pu-item.uploaded .pu-label{color:var(--grn)}
.pu-item .pu-link{font-size:9px;color:var(--ac2);text-decoration:underline;margin-top:2px}
.pu-item input[type=file]{display:none}
.email-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:999;display:none;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto}
.email-overlay.open{display:flex}
.email-box{background:var(--sf);border-radius:12px;width:100%;max-width:640px;margin:40px auto;box-shadow:0 12px 40px rgba(0,0,0,.25);overflow:hidden}
.email-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--bd);background:var(--bg)}
.email-body{padding:14px 18px;max-height:60vh;overflow-y:auto}
.email-ftr{padding:12px 18px;border-top:1px solid var(--bd);display:flex;gap:8px;justify-content:flex-end}
.calc-hint{font-size:9px;color:var(--tx3);margin-top:2px}
.r3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
</style>
</head>
<body>
<header class="hdr">
  <a href="/" class="hdr-logo"><img src="/images/logo_2.png" alt="Openhouse" style="height:32px"></a>
  <div class="hdr-center"><div class="form-name">CP Bill Generation</div></div>
  <div class="hdr-right"></div>
</header>
<div class="ctn">
  <div class="card"><div class="card-t">Load Property</div>
    <div class="load-row"><div class="fg"><label>UID</label><select id="uidSel" style="font-family:var(--mono)"></select></div>
      <button type="button" class="btn btn-dark btn-sm" id="loadBtn">Load</button></div>
    <div id="prefillStatus" class="pf-st"></div>
  </div>

  <div id="cpBillForm" style="display:none">
    <div class="card">
      <div class="card-t">Property Info</div>
      <div class="r2">
        <div class="fg"><label>Society</label><input type="text" id="ro_soc" class="pre" readonly></div>
        <div class="fg"><label>Unit / Tower</label><input type="text" id="ro_unit" class="pre" readonly></div>
      </div>
      <div class="r2">
        <div class="fg"><label>Owner</label><input type="text" id="ro_owner" class="pre" readonly></div>
        <div class="fg"><label>City</label><input type="text" id="ro_city" class="pre" readonly></div>
      </div>
    </div>

    <div class="card">
      <div class="card-t">CP Details</div>
      <div class="r2">
        <div class="fg"><label>CP Name <span class="req">*</span></label><input type="text" name="cp_name" id="f_cpName" required><div class="err-msg">Required</div></div>
        <div class="fg"><label>CP Phone <span class="req">*</span></label><input type="tel" name="cp_phone" id="f_cpPhone" maxlength="10" inputmode="numeric" oninput="this.value=this.value.replace(/[^1-9]/g,'').slice(0,1)+this.value.slice(1).replace(/\D/g,'').slice(0,9)" required><div class="err-msg">Required (10 digits, no leading 0)</div></div>
      </div>
      <div class="r2">
        <div class="fg"><label>CP Firm</label><input type="text" name="cp_firm" id="f_cpFirm"></div>
        <div class="fg"><label>CP Email</label><input type="email" name="cp_email" id="f_cpEmail"></div>
      </div>
    </div>

    <div class="card">
      <div class="card-t">Deal Information</div>
      <div class="r3">
        <div class="fg"><label>Deal Type</label><input type="text" id="f_dealType" value="Acquisition/Supply" class="pre" readonly></div>
        <div class="fg"><label>Deal Value (₹)</label><input type="text" name="deal_value" id="f_dealValue" class="pre" readonly></div>
        <div class="fg"><label>OH Acquired Model</label><input type="text" name="oh_acquired_model" id="f_model" class="pre" readonly></div>
      </div>
      <div class="r2">
        <div class="fg"><label>Agreed Brokerage (%) <span class="req">*</span></label>
          <div class="calc-hint" id="brkHint" style="min-height:14px"></div>
          <input type="text" id="f_brokeragePct" inputmode="decimal" required oninput="if(parseFloat(this.value)>100)this.value=100"><div class="err-msg">Required</div></div>
        <div class="fg"><label>Total Brokerage (₹) <span class="req">*</span></label>
          <div style="min-height:14px"></div>
          <input type="text" name="total_brokerage_amount" id="f_totalBrokerage" required><div class="err-msg">Required</div></div>
      </div>
      <div class="r2">
        <div class="fg"><label>Incentive for Visit (₹)</label><input type="number" name="incentive_visit" id="f_incentiveVisit" step="1"></div>
        <div class="fg"><label>Incentive for Owner Meeting (₹)</label><input type="number" name="incentive_owner_meeting" id="f_incentiveMeeting" step="1"></div>
      </div>
      <div class="fg"><label>Total Amount (₹)</label><input type="text" id="f_totalAmount" class="pre" readonly></div>
    </div>

    <div class="card">
      <div class="card-t">Documents Upload for CP</div>
      <div class="photo-upload">
        <div class="pu-item" id="pu_aadhaarFront" onclick="pickFile('cp_aadhaar_front')">
          <div class="pu-icon">📄</div><div class="pu-label">Aadhaar Card Front</div>
          <input type="file" id="fi_cp_aadhaar_front" accept="image/*,.pdf" onchange="uploadDoc(this,'cp_aadhaar_front')">
        </div>
        <div class="pu-item" id="pu_aadhaarBack" onclick="pickFile('cp_aadhaar_back')">
          <div class="pu-icon">📄</div><div class="pu-label">Aadhaar Card Back</div>
          <input type="file" id="fi_cp_aadhaar_back" accept="image/*,.pdf" onchange="uploadDoc(this,'cp_aadhaar_back')">
        </div>
        <div class="pu-item" id="pu_pan" onclick="pickFile('cp_pan_card')">
          <div class="pu-icon">📄</div><div class="pu-label">PAN Card</div>
          <input type="file" id="fi_cp_pan_card" accept="image/*,.pdf" onchange="uploadDoc(this,'cp_pan_card')">
        </div>
        <div class="pu-item" id="pu_cheque" onclick="pickFile('cp_cancelled_cheque')">
          <div class="pu-icon">📄</div><div class="pu-label">Cancelled Cheque</div>
          <input type="file" id="fi_cp_cancelled_cheque" accept="image/*,.pdf" onchange="uploadDoc(this,'cp_cancelled_cheque')">
        </div>
        <div class="pu-item" id="pu_ama" onclick="pickFile('cp_ama_signed')" style="grid-column:span 2">
          <div class="pu-icon">📄</div><div class="pu-label">AMA Signed (PDF)</div>
          <input type="file" id="fi_cp_ama_signed" accept=".pdf,application/pdf" onchange="uploadDoc(this,'cp_ama_signed')">
        </div>
      </div>
    </div>

    <button type="button" class="btn btn-dark" id="submitBtn" style="width:100%">Submit CP Bill</button>
    <button type="button" class="btn btn-out" id="emailBtn" style="width:100%;margin-top:8px;display:none;color:var(--ac2);border-color:var(--ac2)">📧 Preview & Send Email</button>
  </div>
</div>

<div class="email-overlay" id="emailModal">
  <div class="email-box">
    <div class="email-hdr"><h3 style="font-size:14px;margin:0">Email Preview</h3><button class="btn btn-out btn-sm" onclick="closeEmailModal()">✕</button></div>
    <div class="email-body" id="emailPreviewBody"></div>
    <div class="email-ftr">
      <button class="btn btn-out btn-sm" onclick="closeEmailModal()">Cancel</button>
      <button class="btn btn-dark btn-sm" id="confirmSendBtn" onclick="confirmSendEmail()">✉ Confirm & Send</button>
    </div>
  </div>
</div>

<script src="/js/shared.js"></script>
<script>
let currentUid=null,loadedData=null,isAdmin=false,isManager=false;
const docUrls={cp_aadhaar_front:'',cp_aadhaar_back:'',cp_pan_card:'',cp_cancelled_cheque:'',cp_ama_signed:''};
const DOC_MAP={cp_aadhaar_front:'cp_aadhaar_front_url',cp_aadhaar_back:'cp_aadhaar_back_url',cp_pan_card:'cp_pan_card_url',cp_cancelled_cheque:'cp_cancelled_cheque_url',cp_ama_signed:'cp_ama_signed_url'};
const ITEM_MAP={cp_aadhaar_front:'pu_aadhaarFront',cp_aadhaar_back:'pu_aadhaarBack',cp_pan_card:'pu_pan',cp_cancelled_cheque:'pu_cheque',cp_ama_signed:'pu_ama'};
let cloudCfg=null;
fetch(`${API}/api/config/cloudinary`).then(r=>r.json()).then(c=>cloudCfg=c).catch(()=>{});

// Brokerage bidirectional calc
function getDV(){return parseFloat(String(document.getElementById('f_dealValue').value).replace(/,/g,''))||0}
let bLock=false;
document.getElementById('f_brokeragePct').addEventListener('input',function(){
  if(bLock)return;bLock=true;
  const dv=getDV();const p=parseFloat(this.value)||0;
  if(dv>0&&p>0){const amt=Math.round(dv*p/100);document.getElementById('f_totalBrokerage').value=amt;document.getElementById('brkHint').textContent=`${p}% of ₹${dv.toLocaleString('en-IN')} = ₹${amt.toLocaleString('en-IN')}`}
  else document.getElementById('brkHint').textContent='';
  bLock=false;calcTotal();
});
document.getElementById('f_totalBrokerage').addEventListener('input',function(){
  if(bLock)return;bLock=true;
  const dv=getDV();const a=parseFloat(String(this.value).replace(/,/g,''))||0;
  if(dv>0&&a>0){const pct=Math.round(a/dv*100*1000)/1000;document.getElementById('f_brokeragePct').value=pct;document.getElementById('brkHint').textContent=`₹${a.toLocaleString('en-IN')} = ${pct}% of ₹${dv.toLocaleString('en-IN')}`}
  else document.getElementById('brkHint').textContent='';
  bLock=false;calcTotal();
});

// Auto-sum total
document.getElementById('f_incentiveVisit').addEventListener('input',calcTotal);
document.getElementById('f_incentiveMeeting').addEventListener('input',calcTotal);
function calcTotal(){
  const tb=parseFloat(String(document.getElementById('f_totalBrokerage').value).replace(/,/g,''))||0;
  const iv=parseFloat(document.getElementById('f_incentiveVisit').value)||0;
  const im=parseFloat(document.getElementById('f_incentiveMeeting').value)||0;
  const total=tb+iv+im;
  document.getElementById('f_totalAmount').value=total?'₹ '+total.toLocaleString('en-IN'):'';
}

document.addEventListener('DOMContentLoaded',async()=>{
  try{
    const me=await fetch('/auth/me').then(r=>r.json());
    isAdmin=me.is_admin;isManager=me.is_manager;
    const r=await fetch(`${API}/api/cp-bill/uids`);const uids=await r.json();
    const sel=document.getElementById('uidSel');
    sel.innerHTML='<option value="">Select UID...</option>';
    uids.forEach(u=>{const o=document.createElement('option');o.value=u.uid;
      o.textContent=`${u.uid} — ${[u.tower_no,u.unit_no].filter(Boolean).join('-')} ${u.society_name||''}${u.cp_bill_submitted_at?' ✓':''}`;sel.appendChild(o)});
    makeSearchable(sel);
    const p=new URLSearchParams(window.location.search);if(p.get('uid')){sel.value=p.get('uid');loadUID(p.get('uid'))}
  }catch(e){toast('Failed to load','err')}
});

document.getElementById('loadBtn').addEventListener('click',()=>{const uid=document.getElementById('uidSel').value;if(!uid){toast('Select UID','warn');return}loadUID(uid)});

async function loadUID(uid){
  const st=document.getElementById('prefillStatus');
  st.className='pf-st show';st.textContent='Loading...';
  try{
    const r=await fetch(`${API}/api/cp-bill/prefill/${uid}`);if(!r.ok){const e=await r.json();throw new Error(e.error)}
    const d=await r.json();currentUid=uid;loadedData=d;
    document.getElementById('ro_soc').value=d.society_name||'';
    document.getElementById('ro_unit').value=[d.tower_no,d.unit_no].filter(Boolean).join('-')||'';
    document.getElementById('ro_owner').value=d.owner_broker_name||'';
    document.getElementById('ro_city').value=d.city||'';
    document.getElementById('f_cpName').value=d.cp_name||'';
    document.getElementById('f_cpPhone').value=d.cp_phone||'';
    document.getElementById('f_cpFirm').value=d.cp_firm||'';
    document.getElementById('f_cpEmail').value=d.cp_email||'';
    // OH Acquired Model auto-calc
    document.getElementById('f_model').value=d.oh_acquired_model||'';
    if(d.performance_guarantee&&d.guaranteed_sale_price){
      const pgAmt=Number(d.performance_guarantee);const gspLakhs=Number(d.guaranteed_sale_price);
      const pct=Math.round(pgAmt/(gspLakhs*100000)*100*1000)/1000;
      const amtL=pgAmt>=10000000?parseFloat((pgAmt/10000000).toFixed(4))+'Cr':parseFloat((pgAmt/100000).toFixed(4))+'L';
      document.getElementById('f_model').value=`${pct}% (${amtL} amount)`;
    }
    // Deal value from GSP
    const gsp=d.guaranteed_sale_price;
    document.getElementById('f_dealValue').value=gsp?Math.round(gsp*100000):'';
    // Brokerage
    document.getElementById('f_brokeragePct').value=d.agreed_brokerage||'';
    document.getElementById('f_totalBrokerage').value=d.total_brokerage_amount||'';
    document.getElementById('brkHint').textContent='';
    const dv=parseFloat(document.getElementById('f_dealValue').value)||0;
    if(dv>0&&d.total_brokerage_amount){const a=parseFloat(String(d.total_brokerage_amount).replace(/,/g,''))||0;if(a>0){const pct=Math.round(a/dv*100*1000)/1000;document.getElementById('f_brokeragePct').value=pct;document.getElementById('brkHint').textContent=`₹${a.toLocaleString('en-IN')} = ${pct}% of ₹${dv.toLocaleString('en-IN')}`}}
    document.getElementById('f_incentiveVisit').value=d.incentive_visit||'';
    document.getElementById('f_incentiveMeeting').value=d.incentive_owner_meeting||'';
    calcTotal();
    // Doc URLs
    for(const[key,col]of Object.entries(DOC_MAP)){
      docUrls[key]=d[col]||'';
      const item=document.getElementById(ITEM_MAP[key]);
      if(d[col]){item.classList.add('uploaded');item.querySelector('.pu-label').textContent+=' ✓';
        const link=item.querySelector('.pu-link');if(!link){const a=document.createElement('a');a.className='pu-link';a.href=d[col];a.target='_blank';a.textContent='View';a.onclick=e=>e.stopPropagation();item.appendChild(a)}}
    }
    document.getElementById('cpBillForm').style.display='block';
    document.getElementById('emailBtn').style.display=((isAdmin||isManager)&&d.cp_bill_submitted_at)?'block':'none';
    st.className='pf-st show ok';st.textContent=`Loaded: ${uid}${d.cp_bill_submitted_at?' (Submitted)':''}`;
  }catch(e){st.className='pf-st show err';st.textContent=e.message;document.getElementById('cpBillForm').style.display='none'}
}

function pickFile(key){document.getElementById('fi_'+key).click()}
async function uploadDoc(input,key){
  if(!input.files.length)return;if(!cloudCfg){toast('Upload not ready','warn');return}
  const file=input.files[0];if(file.size>10*1024*1024){toast('File exceeds 10MB','err');return}
  const item=document.getElementById(ITEM_MAP[key]);item.querySelector('.pu-label').textContent='Uploading...';
  try{
    const fd=new FormData();fd.append('file',file);fd.append('upload_preset',cloudCfg.uploadPreset);fd.append('folder','cp-bill');
    const r=await fetch(`https://api.cloudinary.com/v1_1/${cloudCfg.cloudName}/auto/upload`,{method:'POST',body:fd});
    const d=await r.json();if(!d.secure_url)throw new Error('Upload failed');
    docUrls[key]=d.secure_url;item.classList.add('uploaded');
    const labelMap={cp_aadhaar_front:'Aadhaar Front ✓',cp_aadhaar_back:'Aadhaar Back ✓',cp_pan_card:'PAN Card ✓',cp_cancelled_cheque:'Cheque ✓',cp_ama_signed:'AMA Signed ✓'};
    item.querySelector('.pu-label').textContent=labelMap[key]||'Uploaded ✓';
    let link=item.querySelector('.pu-link');if(!link){link=document.createElement('a');link.className='pu-link';link.target='_blank';link.textContent='View';link.onclick=e=>e.stopPropagation();item.appendChild(link)}
    link.href=d.secure_url;toast('Uploaded','ok');
  }catch(e){toast('Upload failed','err');item.querySelector('.pu-label').textContent=key.replace(/cp_/,'').replace(/_/g,' ')}
}

function validatePhone(val){return /^[1-9]\d{9}$/.test(val)}

document.getElementById('submitBtn').addEventListener('click',()=>{
  if(!currentUid){toast('Select a UID','warn');return}
  const cpPhone=document.getElementById('f_cpPhone').value.trim();
  if(cpPhone&&!validatePhone(cpPhone)){toast('CP Phone must be 10 digits, cannot start with 0','err');return}
  const body={uid:currentUid};
  body.cp_name=document.getElementById('f_cpName').value.trim();
  body.cp_phone=cpPhone;
  body.cp_firm=document.getElementById('f_cpFirm').value.trim();
  body.cp_email=document.getElementById('f_cpEmail').value.trim();
  body.deal_type='Acquisition/Supply';
  body.oh_acquired_model=document.getElementById('f_model').value.trim();
  body.agreed_brokerage=document.getElementById('f_brokeragePct').value.trim();
  body.deal_value=document.getElementById('f_dealValue').value.trim();
  body.total_brokerage_amount=document.getElementById('f_totalBrokerage').value.trim();
  body.incentive_visit=document.getElementById('f_incentiveVisit').value.trim();
  body.incentive_owner_meeting=document.getElementById('f_incentiveMeeting').value.trim();
  // Calc total
  const tb=parseFloat(String(body.total_brokerage_amount).replace(/,/g,''))||0;
  const iv=parseFloat(body.incentive_visit)||0;
  const im=parseFloat(body.incentive_owner_meeting)||0;
  body.total_cp_amount=String(tb+iv+im);
  for(const[key,col]of Object.entries(DOC_MAP)){body[col]=docUrls[key]||null}

  if(!body.cp_name){toast('CP Name required','err');return}
  if(!body.cp_phone){toast('CP Phone required','err');return}
  if(!body.agreed_brokerage){toast('Agreed Brokerage % required','err');return}
  if(!body.total_brokerage_amount){toast('Total Brokerage required','err');return}

  submitBtn(document.getElementById('submitBtn'),async()=>{
    const r=await fetch(`${API}/api/cp-bill/submit`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    const res=await r.json();if(!r.ok)throw new Error(res.error);
    toast('CP Bill submitted!','ok');
    if(isAdmin||isManager)document.getElementById('emailBtn').style.display='block';
  });
});

document.getElementById('emailBtn').addEventListener('click',()=>{
  if(!currentUid){toast('Select a UID','warn');return}
  const addr=[loadedData?.unit_no,loadedData?.tower_no,loadedData?.society_name,loadedData?.locality,loadedData?.city].filter(Boolean).join(', ');
  const amaStatus=docUrls.cp_ama_signed?'Signed (attached below)':'Not signed yet';
  const photoLines=[];
  if(docUrls.cp_aadhaar_front)photoLines.push(`• <a href="${docUrls.cp_aadhaar_front}" target="_blank">Aadhaar Front</a>`);
  if(docUrls.cp_aadhaar_back)photoLines.push(`• <a href="${docUrls.cp_aadhaar_back}" target="_blank">Aadhaar Back</a>`);
  if(docUrls.cp_pan_card)photoLines.push(`• <a href="${docUrls.cp_pan_card}" target="_blank">PAN Card</a>`);
  if(docUrls.cp_cancelled_cheque)photoLines.push(`• <a href="${docUrls.cp_cancelled_cheque}" target="_blank">Cancelled Cheque</a>`);
  if(docUrls.cp_ama_signed)photoLines.push(`• <a href="${docUrls.cp_ama_signed}" target="_blank">AMA Signed (PDF)</a>`);
  const html=`<div style="font-size:13px;line-height:1.8">
<p><strong>Subject:</strong> CP Bill Generation | ${addr}</p>
<hr style="border:none;border-top:1px solid var(--bd);margin:10px 0">
<p>Hi Accounts Team,</p>
<p>Kindly prepare the CP bill for the below mentioned property:</p>
<table style="font-size:13px;line-height:2">
<tr><td style="padding:1px 10px 1px 0;font-weight:600">Deal Type:</td><td>Acquisition/Supply</td></tr>
<tr><td style="padding:1px 10px 1px 0;font-weight:600">CP Name:</td><td>${document.getElementById('f_cpName').value||'—'}</td></tr>
<tr><td style="padding:1px 10px 1px 0;font-weight:600">CP Firm:</td><td>${document.getElementById('f_cpFirm').value||'—'}</td></tr>
<tr><td style="padding:1px 10px 1px 0;font-weight:600">Mobile Number:</td><td>${document.getElementById('f_cpPhone').value||'—'}</td></tr>
<tr><td style="padding:1px 10px 1px 0;font-weight:600">Email ID:</td><td>${document.getElementById('f_cpEmail').value||'—'}</td></tr>
<tr><td style="padding:1px 10px 1px 0;font-weight:600">Property Address:</td><td>${addr}</td></tr>
<tr><td style="padding:1px 10px 1px 0;font-weight:600">OH Acquired Model:</td><td>${document.getElementById('f_model').value||'—'}</td></tr>
<tr><td style="padding:1px 10px 1px 0;font-weight:600">Agreed Brokerage:</td><td>${document.getElementById('f_brokeragePct').value||'—'}%</td></tr>
<tr><td style="padding:1px 10px 1px 0;font-weight:600">AMA Status:</td><td>${amaStatus}</td></tr>
<tr><td style="padding:1px 10px 1px 0;font-weight:600">Deal Value:</td><td>${document.getElementById('f_dealValue').value||'—'}</td></tr>
<tr><td style="padding:1px 10px 1px 0;font-weight:600">Total Brokerage:</td><td>₹${document.getElementById('f_totalBrokerage').value||'—'}</td></tr>
<tr><td style="padding:1px 10px 1px 0;font-weight:600">Incentive for Visit:</td><td>₹${document.getElementById('f_incentiveVisit').value||'—'}</td></tr>
<tr><td style="padding:1px 10px 1px 0;font-weight:600">Incentive for Owner Meeting:</td><td>₹${document.getElementById('f_incentiveMeeting').value||'—'}</td></tr>
<tr><td style="padding:1px 10px 1px 0;font-weight:600">Total Amount:</td><td>${document.getElementById('f_totalAmount').value||'—'}</td></tr>
</table>
${photoLines.length?`<p style="margin-top:10px"><strong>Attached Documents:</strong></p>${photoLines.join('<br>')}`:''}
<p style="margin-top:10px">Prashant Singh, kindly approve the same.</p>
</div>`;
  document.getElementById('emailPreviewBody').innerHTML=html;
  document.getElementById('emailModal').classList.add('open');
});

function closeEmailModal(){document.getElementById('emailModal').classList.remove('open')}
document.getElementById('emailModal').addEventListener('click',e=>{if(e.target===e.currentTarget)closeEmailModal()});

async function confirmSendEmail(){
  const btn=document.getElementById('confirmSendBtn');btn.disabled=true;btn.textContent='Sending...';
  try{
    const r=await fetch(`${API}/api/cp-bill/send-email/${currentUid}`,{method:'POST',headers:{'Content-Type':'application/json'}});
    const d=await r.json();if(!r.ok)throw new Error(d.error);
    toast('Email sent successfully!','ok',5000);closeEmailModal();
  }catch(e){toast(e.message||'Failed','err');
    if(e.message&&e.message.includes('log out'))toast('Please logout and login again','warn',8000);
  }finally{btn.disabled=false;btn.textContent='✉ Confirm & Send'}
}
</script>
</body></html>
