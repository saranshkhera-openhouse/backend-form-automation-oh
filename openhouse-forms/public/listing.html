<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"><title>Openhouse — Listing Details</title><link rel="stylesheet" href="/css/styles.css"></head>
<body>
<header class="hdr">
  <a href="/" class="hdr-logo"><img src="/images/logo_2.png" alt="Openhouse" style="height:32px"></a>
  <div class="hdr-right"><div class="form-name">Listing Details</div></div>
  <div class="hdr-right"></div>
</header>
<div class="ctn">
  <div class="card"><div class="card-t">Load Property</div>
    <div class="load-row"><div class="fg"><label>UID</label><select id="selUid" style="font-family:var(--mono)"></select></div>
      <button type="button" class="btn btn-dark btn-sm" id="loadBtn">Load</button></div>
    <div class="pf-st" id="pfSt"></div></div>

  <form id="listForm" style="display:none"><input type="hidden" name="uid" id="fUid">
    <div class="card"><div class="card-t">Property Details</div>
      <div class="r2"><div class="fg"><label>UID</label><input type="text" id="l_uid" class="pre" readonly></div>
        <div class="fg"><label>City</label><input type="text" id="l_city" class="pre" readonly></div></div>
      <div class="r2"><div class="fg"><label>Society</label><input type="text" id="l_soc" class="pre" readonly></div>
        <div class="fg"><label>Locality</label><input type="text" id="l_loc" class="pre" readonly></div></div>
      <div class="r3"><div class="fg"><label>Unit</label><input type="text" id="l_unit" class="pre" readonly></div>
        <div class="fg"><label>Tower</label><input type="text" id="l_tower" class="pre" readonly></div>
        <div class="fg"><label>Floor</label><input type="text" id="l_floor" class="pre" readonly></div></div>
      <div class="r2"><div class="fg"><label>Area (in sqft)</label><input type="text" id="l_area" class="pre" readonly></div>
        <div class="fg"><label>Configuration</label><input type="text" id="l_cfg" class="pre" readonly></div></div></div>

    <div class="card"><div class="card-t">Area & Amenities</div>
      <div class="r2">
        <div class="fg"><label>Super Area (sqft) <span class="req">*</span></label><input type="number" name="super_area" id="superArea" step="0.01" required><div class="err-msg">Required</div></div>
        <div class="fg"><label>Carpet Area (sqft) <span class="req">*</span></label><input type="number" name="carpet_area" id="carpetArea" step="0.01" required><div class="err-msg">Required</div></div>
      </div>
      <div class="r2">
        <div class="fg"><label>Gas Pipeline <span class="req">*</span></label><select name="gas_pipeline" id="gasPipe" required><option value="">Select...</option><option>Yes</option><option>No</option></select><div class="err-msg">Required</div></div>
        <div class="fg"><label>Club Facility <span class="req">*</span></label><select name="club_facility" id="clubFac" required><option value="">Select...</option><option>Yes</option><option>No</option></select><div class="err-msg">Required</div></div>
      </div>
    </div>

    <div class="card"><div class="card-t">Charges & Financial</div>
      <div class="r2">
        <div class="fg"><label>Maintenance (₹/sqft) <span class="req">*</span></label><input type="number" name="maintenance_charges" step="0.01" required><div class="err-msg">Required</div></div>
        <div class="fg"><label>Society Move-in Charges (in ₹) <span class="req">*</span></label><input type="number" name="society_move_in_charges" required><div class="err-msg">Required</div></div>
      </div>
      <div class="r2">
        <div class="fg"><label>Electricity (₹/unit) <span class="req">*</span></label><input type="number" name="electricity_charges" step="0.01" required><div class="err-msg">Required</div></div>
        <div class="fg"><label>DG Charges (₹/unit) <span class="req">*</span></label><input type="number" name="dg_charges" step="0.01" required><div class="err-msg">Required</div></div>
      </div>
    </div>

    <div class="card"><div class="card-t">Additional Info</div>
      <div class="fg"><label>Seller Location <span class="req">*</span></label><input type="text" name="seller_location" required><div class="err-msg">Required</div></div>
      <div class="r2">
        <div class="fg"><label>Seller Residential Status <span class="req">*</span></label><select name="seller_residential_status" id="selResStatus" required><option value="">Select...</option><option>RI</option><option>NRI</option></select><div class="err-msg">Required</div></div>
        <div class="fg"><label>Sellers Available on Registry <span class="req">*</span></label><select name="sellers_available_on_registry" id="selRegistry" required><option value="">Select...</option><option>Yes</option><option>No</option></select><div class="err-msg">Required</div></div>
      </div>
    </div>

    <button type="button" class="btn btn-dark" id="submitBtn" style="width:100%">Submit Listing</button>
    <button type="button" class="btn" id="sellerDashBtn" disabled style="width:100%;margin-top:8px;background:#f59e0b;color:#fff;border:none;font-weight:700">Update Seller Dashboard Listing</button>
  </form>
</div>
<script src="/js/shared.js"></script>
<script>
document.addEventListener('DOMContentLoaded',async()=>{
  try{
    const ur=await fetch(`${API}/api/listing/uids`);const uids=await ur.json();
    fillUidSelect(document.getElementById('selUid'),uids);makeSearchable(document.getElementById('selUid'));
    const p=new URLSearchParams(location.search);if(p.get('uid')){document.getElementById('selUid').value=p.get('uid');loadData()}
  }catch(e){toast('Config failed','err')}
});
document.getElementById('loadBtn').addEventListener('click',loadData);
async function loadData(){const uid=document.getElementById('selUid').value;if(!uid){toast('Select UID','warn');return}
  const st=document.getElementById('pfSt');st.className='pf-st show';st.textContent='Loading...';
  try{const r=await fetch(`${API}/api/listing/prefill/${uid}`);if(!r.ok)throw new Error((await r.json()).error);const d=await r.json();
    document.getElementById('fUid').value=d.uid;
    document.getElementById('l_uid').value=d.uid;document.getElementById('l_city').value=d.city||'';
    document.getElementById('l_soc').value=d.society_name||'';document.getElementById('l_loc').value=d.locality||'';
    document.getElementById('l_unit').value=d.unit_no||'';document.getElementById('l_tower').value=d.tower_no||'';
    document.getElementById('l_floor').value=d.floor??'';document.getElementById('l_area').value=d.area_sqft??'';
    document.getElementById('l_cfg').value=configDisplay(d.configuration,d.extra_area);
    // Editable fields
    const sv=(n,v)=>{const el=document.querySelector(`[name="${n}"]`);if(el&&v!=null)el.value=v};
    sv('maintenance_charges',d.maintenance_charges);sv('society_move_in_charges',d.society_move_in_charges);
    sv('electricity_charges',d.electricity_charges);sv('dg_charges',d.dg_charges);
    sv('seller_location',d.seller_location);
    // Area & Amenities prefill
    document.getElementById('superArea').value=d.super_area||d.area_sqft||'';
    document.getElementById('carpetArea').value=d.carpet_area||'';
    document.getElementById('gasPipe').value=d.gas_pipeline||'';
    document.getElementById('clubFac').value=d.club_facility||'';
    document.getElementById('selResStatus').value=d.seller_residential_status||'';
    document.getElementById('selRegistry').value=d.sellers_available_on_registry||'';
    document.getElementById('listForm').style.display='block';
    document.getElementById('sellerDashBtn').disabled=!d.listing_submitted_at;
    st.className='pf-st show ok';st.textContent=`Loaded: ${uid}`;
  }catch(e){st.className='pf-st show err';st.textContent=e.message;document.getElementById('listForm').style.display='none'}}
document.getElementById('submitBtn').addEventListener('click',()=>{
  const{valid,missing}=validateForm('listForm');if(!valid){toast(`Missing: ${missing.slice(0,3).join(', ')}`,'err');return}
  const fd=new FormData(document.getElementById('listForm'));const body=Object.fromEntries(fd.entries());
  ['maintenance_charges','society_move_in_charges','electricity_charges','dg_charges'].forEach(k=>{if(body[k])body[k]=body[k].replace(/,/g,'')});
  submitBtn(document.getElementById('submitBtn'),async()=>{
    const r=await fetch(`${API}/api/listing/submit`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    const res=await r.json();if(!r.ok)throw new Error(res.error);
    document.getElementById('sellerDashBtn').disabled=false;
    showThankYou(body.uid)})});
document.getElementById('sellerDashBtn').addEventListener('click',()=>{
  if(!currentUid){toast('Load a property first','warn');return}
  toast('Coming soon','warn');
});
</script>
</body></html>
